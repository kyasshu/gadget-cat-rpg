<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ミライポケットRPG 感情ガジェットの逆襲</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #fff7db;
      --muted: #bad8e6;
      --panel: rgba(8, 31, 46, 0.94);
      --panel2: rgba(18, 57, 72, 0.94);
      --line: #dff8ff;
      --gold: #ffd65d;
      --red: #ef6b62;
      --blue: #47b8ec;
      --green: #78dc88;
      --violet: #bc91ff;
      --shadow: rgba(0, 0, 0, 0.42);
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(4, 18, 28, 0.55), rgba(4, 18, 28, 0.92)),
        url("assets/kid-room-battle.png") center / cover fixed no-repeat;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button {
      border: 2px solid rgba(255, 247, 219, 0.9);
      border-radius: 7px;
      background: linear-gradient(180deg, #2f7d8c, #173d56);
      color: var(--ink);
      min-height: 42px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 900;
      line-height: 1.15;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.34);
    }

    button:hover:not(:disabled) { filter: brightness(1.13); }
    button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.34); }
    button:disabled { opacity: 0.42; cursor: not-allowed; }

    .shell {
      width: min(1220px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(460px, 1fr) auto;
      gap: 12px;
    }

    .box {
      border: 3px solid rgba(255, 247, 219, 0.92);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: 0 14px 34px var(--shadow), inset 0 0 0 2px rgba(71, 184, 236, 0.18);
    }

    header.box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    h1 {
      margin: 0;
      color: #fff0a8;
      font-size: clamp(1.12rem, 2.8vw, 1.8rem);
      line-height: 1.15;
      text-shadow: 0 3px 0 rgba(0,0,0,0.45);
    }

    .chapter {
      min-width: min(360px, 100%);
      padding: 7px 10px;
      border: 1px solid rgba(255, 247, 219, 0.5);
      border-radius: 7px;
      background: rgba(3, 17, 28, 0.48);
      color: var(--muted);
      font-weight: 800;
      line-height: 1.35;
      text-align: right;
    }

    .arena {
      position: relative;
      overflow: hidden;
      border: 4px solid #113b4d;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(14, 70, 90, 0.05), rgba(5, 18, 26, 0.48)),
        var(--scene-image, url("assets/kid-room-battle.png")) center / cover no-repeat;
      box-shadow: inset 0 0 0 3px rgba(255, 247, 219, 0.7), 0 14px 34px var(--shadow);
      min-height: 0;
    }

    .story-strip {
      position: absolute;
      left: 12px;
      top: 12px;
      width: min(440px, calc(100% - 24px));
      min-height: 118px;
      padding: 12px;
      border: 2px solid rgba(255, 247, 219, 0.82);
      border-radius: 8px;
      background: rgba(6, 25, 38, 0.82);
      line-height: 1.55;
      font-weight: 800;
      z-index: 3;
      cursor: pointer;
      user-select: none;
    }

    .story-strip:hover {
      border-color: #fff1a0;
      background: rgba(6, 25, 38, 0.9);
    }

    .story-speaker {
      display: inline-block;
      margin-bottom: 5px;
      padding: 2px 8px;
      border: 1px solid rgba(255, 247, 219, 0.64);
      border-radius: 999px;
      background: rgba(255, 214, 93, 0.14);
      color: #fff1a0;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .story-text {
      min-height: 48px;
      font-size: 0.98rem;
    }

    .story-next {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-align: right;
    }

    .party-field,
    .enemy-field {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: clamp(7px, 1.5vw, 18px);
      padding: 0 20px;
    }

    .enemy-field { top: 25%; align-items: start; }
    .party-field { bottom: 8%; }

    .unit {
      position: relative;
      width: min(18%, 112px);
      min-width: 58px;
      display: grid;
      gap: 5px;
      justify-items: center;
      transition: transform 260ms ease, filter 260ms ease, opacity 260ms ease;
    }

    .unit.active { transform: translateY(-10px); filter: drop-shadow(0 0 12px rgba(255, 214, 93, 0.7)); }
    .unit.down { opacity: 0.48; filter: grayscale(0.7); }
    .unit.hidden { opacity: 0.28; filter: saturate(0.3) blur(1px); }
    .unit.hit { transform: translateX(-12px) scale(0.92); filter: brightness(1.9) saturate(1.25); }
    .unit.attack { transform: translateY(-18px) scale(1.12); filter: drop-shadow(0 0 18px rgba(255, 241, 160, 0.85)); }

    .unit.attack::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 3px solid rgba(255, 241, 160, 0.8);
      border-radius: 50%;
      pointer-events: none;
      animation: attackShock 520ms ease-out forwards;
    }

    .damage-pop {
      position: absolute;
      left: 50%;
      top: -20%;
      z-index: 8;
      transform: translateX(-50%);
      color: #fff1a0;
      font-size: clamp(1rem, 3vw, 1.65rem);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 3px 0 #4b160e, 0 0 10px rgba(255, 214, 93, 0.9);
      pointer-events: none;
      animation: damageRise 1100ms ease-out forwards;
    }

    .damage-pop.heal {
      color: #b9ffb7;
      text-shadow: 0 3px 0 #104819, 0 0 10px rgba(120, 220, 136, 0.85);
    }

    .damage-pop.bad {
      color: #ff9d91;
      text-shadow: 0 3px 0 #4b160e, 0 0 10px rgba(239, 107, 98, 0.85);
    }

    @keyframes damageRise {
      0% { opacity: 0; transform: translate(-50%, 10px) scale(0.85); }
      22% { opacity: 1; transform: translate(-50%, -4px) scale(1.16); }
      72% { opacity: 1; transform: translate(-50%, -34px) scale(1.04); }
      100% { opacity: 0; transform: translate(-50%, -52px) scale(0.96); }
    }

    @keyframes attackShock {
      0% { opacity: 0; transform: scale(0.65); }
      28% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.55); }
    }

    .turn-banner {
      position: absolute;
      left: 50%;
      top: 47%;
      z-index: 9;
      min-width: min(360px, calc(100% - 32px));
      padding: 12px 18px;
      transform: translate(-50%, -50%) scale(0.96);
      border: 3px solid rgba(255, 247, 219, 0.96);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(91, 25, 31, 0.96), rgba(42, 12, 22, 0.96));
      color: #fff1a0;
      font-size: clamp(1.05rem, 3vw, 1.8rem);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 3px 0 rgba(0,0,0,0.5);
      box-shadow: 0 18px 38px rgba(0,0,0,0.42);
      opacity: 0;
      pointer-events: none;
    }

    .turn-banner.show {
      animation: bannerPulse 720ms ease-out forwards;
    }

    @keyframes bannerPulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
      72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.98); }
    }

    .rewind-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18), transparent 18%),
        linear-gradient(180deg, rgba(3, 14, 28, 0.62), rgba(3, 14, 28, 0.94));
      color: #fff1a0;
      pointer-events: none;
    }

    .rewind-overlay.show {
      display: grid;
      pointer-events: auto;
    }

    .rewind-spiral {
      position: absolute;
      width: 165vmax;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from 0deg, rgba(92, 225, 255, 0.75) 0 10deg, transparent 10deg 24deg),
        repeating-radial-gradient(circle, transparent 0 5%, rgba(255, 241, 160, 0.26) 5.5% 6.8%, transparent 7.3% 11%);
      animation: rewindSpin 1.6s linear infinite;
      filter: blur(1px);
      opacity: 0.78;
    }

    .rewind-card {
      position: relative;
      width: min(620px, calc(100% - 36px));
      padding: clamp(18px, 4vw, 32px);
      border: 4px solid rgba(255, 247, 219, 0.95);
      border-radius: 8px;
      background: rgba(7, 31, 48, 0.9);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .rewind-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: clamp(1.2rem, 4vw, 2.1rem);
      text-shadow: 0 3px 0 rgba(0,0,0,0.55);
    }

    .rewind-card span {
      display: block;
      color: #d7f6ff;
      font-weight: 900;
      line-height: 1.55;
    }

    .defeat-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }

    .defeat-actions button {
      min-width: 180px;
    }

    @keyframes rewindSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(-360deg) scale(0.86); }
    }

    .nameplate {
      max-width: 100%;
      padding: 2px 7px;
      border: 2px solid rgba(255, 247, 219, 0.86);
      border-radius: 999px;
      background: rgba(6, 25, 38, 0.84);
      color: #fff7db;
      font-size: clamp(0.7rem, 1.4vw, 0.86rem);
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .enemy-hp {
      width: min(88px, 100%);
      height: 13px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 247, 219, 0.82);
      border-radius: 999px;
      background: rgba(7, 20, 28, 0.92);
      box-shadow: 0 2px 0 rgba(0,0,0,0.38);
    }

    .enemy-hp-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ef6b62, #ffd65d);
    }

    .enemy-hp-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff7db;
      font-size: 0.56rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,0.82);
    }

    .avatar {
      width: clamp(54px, 8vw, 92px);
      aspect-ratio: 1;
      position: relative;
      filter: drop-shadow(0 12px 8px rgba(0,0,0,0.4));
    }

    .person .head {
      position: absolute;
      left: 25%;
      top: 4%;
      width: 50%;
      height: 42%;
      border: 3px solid #2f1a12;
      border-radius: 50%;
      background: #f3c79a;
    }

    .person .hair {
      position: absolute;
      left: 21%;
      top: 1%;
      width: 58%;
      height: 30%;
      border-radius: 50% 50% 34% 34%;
      background: #2d211b;
      border: 2px solid #1a100d;
    }

    .person .body {
      position: absolute;
      left: 20%;
      bottom: 4%;
      width: 60%;
      height: 52%;
      border: 3px solid #2f1a12;
      border-radius: 13px 13px 9px 9px;
      background: var(--shirt, #e65d50);
    }

    .person .eye,
    .person .eye::after {
      content: "";
      position: absolute;
      top: 22%;
      left: 40%;
      width: 6%;
      height: 7%;
      border-radius: 50%;
      background: #1b1512;
      z-index: 2;
    }

    .person .eye::after { left: 230%; top: 0; width: 100%; height: 100%; }

    .cat .body {
      position: absolute;
      inset: 8% 9% 9%;
      border: 3px solid #082d45;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 40%, #7ad6ff 0 18%, #22a5e3 19% 64%, #1477b6 65%);
    }

    .cat .face {
      position: absolute;
      inset: 28% 18% 16%;
      border: 2px solid #082d45;
      border-radius: 50%;
      background: #fff7e1;
    }

    .cat .ear {
      position: absolute;
      top: 4%;
      width: 26%;
      aspect-ratio: 1;
      border: 3px solid #082d45;
      border-radius: 50%;
      background: #23a4e3;
    }

    .cat .ear.left { left: 15%; }
    .cat .ear.right { right: 15%; }
    .cat .pocket {
      position: absolute;
      left: 38%;
      bottom: 16%;
      width: 24%;
      height: 14%;
      border: 2px solid #082d45;
      border-radius: 0 0 999px 999px;
      background: #ffe56b;
    }

    .cat .eye,
    .cat .eye::after {
      content: "";
      position: absolute;
      top: 35%;
      left: 38%;
      width: 8%;
      height: 10%;
      border-radius: 50%;
      background: #102a34;
      z-index: 2;
    }

    .cat .eye::after { left: 230%; top: 0; width: 100%; height: 100%; }

    .gadget .avatar {
      animation: floaty 1.8s ease-in-out infinite alternate;
    }

    .gadget-art {
      border: 4px solid #2e1d11;
      background: radial-gradient(circle at 42% 34%, #fff0a8 0 10%, var(--gadget, #ff914d) 11% 54%, #642f46 55%);
      overflow: visible;
    }

    .gadget-art .eye,
    .gadget-art .eye::after {
      content: "";
      position: absolute;
      top: 36%;
      left: 31%;
      width: 13%;
      height: 13%;
      border-radius: 50%;
      background: #23120c;
      z-index: 3;
    }

    .gadget-art .eye::after { left: 210%; top: 0; width: 100%; height: 100%; }

    .gadget-art.air {
      border-radius: 50% 46% 42% 48%;
      background: linear-gradient(180deg, #ffb36a, #db563f 72%);
    }

    .gadget-art.air .barrel {
      position: absolute;
      left: 42%;
      top: -18%;
      width: 24%;
      height: 48%;
      border: 4px solid #2e1d11;
      border-radius: 999px;
      background: linear-gradient(180deg, #f7d06b, #d57b36);
      transform: rotate(28deg);
    }

    .gadget-art.air .nozzle {
      position: absolute;
      right: -16%;
      top: 37%;
      width: 34%;
      height: 22%;
      border: 4px solid #2e1d11;
      border-radius: 0 999px 999px 0;
      background: #ffe093;
    }

    .gadget-art.mirror {
      border-radius: 18px;
      background: linear-gradient(135deg, #bff4ff, #457dde 56%, #182e8a);
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.34);
      transform: rotate(-5deg);
    }

    .gadget-art.mirror .shine {
      position: absolute;
      left: 18%;
      top: 13%;
      width: 28%;
      height: 62%;
      border-radius: 999px;
      background: rgba(255,255,255,0.38);
      transform: rotate(30deg);
    }

    .gadget-art.mist {
      border-radius: 46% 54% 48% 52%;
      background: linear-gradient(180deg, #aef8ef, #48bfb2 68%, #1b6b86);
    }

    .gadget-art.mist .cap {
      position: absolute;
      left: 28%;
      top: -15%;
      width: 44%;
      height: 28%;
      border: 4px solid #2e1d11;
      border-radius: 999px 999px 8px 8px;
      background: #e7fff5;
    }

    .gadget-art.mist .cloud {
      position: absolute;
      right: -24%;
      top: 10%;
      width: 42%;
      height: 28%;
      border-radius: 999px;
      background: rgba(208,255,247,0.82);
      box-shadow: -22px 12px 0 rgba(208,255,247,0.58), -6px 26px 0 rgba(208,255,247,0.42);
    }

    .gadget-art.mic {
      border-radius: 999px 999px 34% 34%;
      background: linear-gradient(180deg, #ff8d79, #d7433e 62%, #6c2131);
    }

    .gadget-art.mic .grill {
      position: absolute;
      inset: 12% 20% 45%;
      border: 3px solid #2e1d11;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #f6d0be 0 5px, #8b3441 5px 9px);
    }

    .gadget-art.mic .handle {
      position: absolute;
      left: 38%;
      bottom: -22%;
      width: 24%;
      height: 42%;
      border: 4px solid #2e1d11;
      border-radius: 999px;
      background: #333b51;
    }

    .gadget-art.speaker {
      border-radius: 18px;
      background: linear-gradient(180deg, #ffd766, #d18028);
    }

    .gadget-art.speaker .cone {
      position: absolute;
      inset: 22%;
      border: 5px solid #2e1d11;
      border-radius: 50%;
      background: radial-gradient(circle, #33200f 0 14%, #ffefd1 15% 36%, #955927 37%);
    }

    .gadget-art.note {
      border-radius: 12px;
      background: linear-gradient(180deg, #9df2ff, #558ee9);
      transform: rotate(4deg);
    }

    .gadget-art.note .paper {
      position: absolute;
      inset: 12%;
      border: 3px solid #2e1d11;
      border-radius: 6px;
      background: repeating-linear-gradient(180deg, #fff5cc 0 10px, #9ac7e9 10px 13px);
    }

    .gadget.boss .avatar {
      border-color: #281445;
      box-shadow: 0 0 30px rgba(188, 145, 255, 0.72);
    }

    @keyframes floaty {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-9px) rotate(2deg); }
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(270px, 0.85fr) minmax(340px, 1.15fr);
      gap: 12px;
    }

    .status-panel,
    .command-panel,
    .dialog {
      padding: 12px;
    }

    .roster {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .card {
      min-width: 0;
      padding: 8px;
      border: 1px solid rgba(255, 247, 219, 0.42);
      border-radius: 7px;
      background: rgba(5, 21, 31, 0.52);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--gold);
      box-shadow: inset 0 0 0 2px rgba(255, 214, 93, 0.35);
    }

    .card strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff2a9;
      font-size: 0.86rem;
    }

    .role {
      margin: 2px 0 7px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .bar {
      height: 11px;
      overflow: hidden;
      border: 1px solid rgba(255,247,219,0.7);
      border-radius: 999px;
      background: #06131d;
    }

    .fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), #d7f071);
      transition: width 220ms ease;
    }

    .mp .fill { background: linear-gradient(90deg, var(--blue), #bcefff); }

    .command-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .turnline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 900;
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .skill {
      display: grid;
      gap: 3px;
      text-align: left;
    }

    .skill small {
      color: #d1edf5;
      font-weight: 800;
      line-height: 1.25;
    }

    .dialog {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 104px;
    }

    .dialog p {
      margin: 0;
      line-height: 1.6;
      font-weight: 800;
    }

    .title {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(90deg, rgba(5, 19, 30, 0.92), rgba(5, 19, 30, 0.3)),
        url("assets/kid-room-battle.png") center / cover no-repeat;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .title.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      display: none;
    }

    .title-card {
      width: min(720px, 100%);
      display: grid;
      gap: 14px;
      padding: clamp(18px, 4vw, 34px);
      border: 4px solid rgba(255,247,219,0.95);
      border-radius: 8px;
      background: rgba(8, 31, 46, 0.93);
      box-shadow: 0 18px 46px rgba(0,0,0,0.48);
    }

    .title-card h2 {
      margin: 0;
      color: #fff0a8;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.03;
      text-shadow: 0 4px 0 rgba(0,0,0,0.42);
    }

    .title-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 900;
    }

    @media (max-width: 860px) {
      .shell { padding: 8px; grid-template-rows: auto minmax(430px, 58dvh) auto; }
      header.box { grid-template-columns: 1fr; }
      .chapter { text-align: left; }
      .hud { grid-template-columns: 1fr; }
      .roster { grid-template-columns: repeat(2, 1fr); }
      .story-strip { font-size: 0.9rem; }
      .dialog { grid-template-columns: 1fr; }
      .skills { grid-template-columns: 1fr; }
      .enemy-field { top: 30%; }
      .party-field { bottom: 7%; padding: 0 8px; }
      .unit { width: 19%; min-width: 50px; }
    }

    @media (max-width: 520px) {
      .avatar { width: 52px; }
      .nameplate { font-size: 0.66rem; padding-inline: 4px; }
      .roster { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px), (max-height: 720px) {
      body.compact-battle {
        overflow: hidden;
      }

      body.compact-battle .shell {
        height: 100dvh;
        min-height: 100dvh;
        padding: 4px;
        gap: 4px;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      }

      body.compact-battle header.box,
      body.compact-battle .story-strip,
      body.compact-battle .dialog {
        display: none;
      }

      body.compact-battle .arena {
        min-height: 0;
        border-width: 2px;
        border-radius: 6px;
        box-shadow: inset 0 0 0 2px rgba(255, 247, 219, 0.64);
      }

      body.compact-battle .enemy-field {
        top: 8%;
        gap: 5px;
        padding: 0 4px;
      }

      body.compact-battle .party-field {
        bottom: 3%;
        left: 50%;
        right: auto;
        width: min(150px, 42%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-items: center;
        align-items: end;
        gap: 6px 8px;
        padding: 0 4px;
        transform: translateX(-50%);
      }

      body.compact-battle .unit {
        width: min(100%, 72px);
        min-width: 54px;
        gap: 2px;
      }

      body.compact-battle .avatar {
        width: clamp(48px, 15vw, 68px);
      }

      body.compact-battle .nameplate {
        max-width: 72px;
        padding: 1px 3px;
        border-width: 1px;
        font-size: 0.56rem;
      }

      body.compact-battle .enemy-hp {
        width: min(72px, 100%);
        height: 10px;
      }

      body.compact-battle .enemy-hp-text {
        font-size: 0.48rem;
      }

      body.compact-battle .hud {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 4px;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      body.compact-battle .status-panel,
      body.compact-battle .command-panel {
        padding: 5px;
        border-width: 2px;
        border-radius: 6px;
        min-height: 0;
        overflow: visible;
      }

      body.compact-battle .roster {
        grid-template-columns: 1fr;
        gap: 3px;
        height: auto;
        align-content: start;
      }

      body.compact-battle .card {
        min-height: 36px;
        padding: 4px 5px;
        border-radius: 5px;
      }

      body.compact-battle .card strong {
        font-size: 0.72rem;
      }

      body.compact-battle .role {
        display: none;
      }

      body.compact-battle .bar {
        height: 6px;
      }

      body.compact-battle .command-panel {
        gap: 3px;
        grid-template-rows: auto auto;
      }

      body.compact-battle .turnline {
        gap: 4px;
        font-size: 0.72rem;
      }

      body.compact-battle .turnline button {
        min-height: 30px;
        padding: 4px 7px;
        font-size: 0.7rem;
      }

      body.compact-battle .skills {
        grid-template-columns: 1fr;
        gap: 3px;
        min-height: 0;
        align-content: start;
      }

      body.compact-battle .skill {
        min-height: 38px;
        padding: 5px 7px;
        gap: 1px;
      }

      body.compact-battle .skill span {
        font-size: 0.76rem;
        line-height: 1.08;
      }

      body.compact-battle .skill small {
        display: none;
      }

      body.compact-battle .turn-banner {
        min-width: min(240px, calc(100% - 24px));
        padding: 8px 10px;
        font-size: 1rem;
      }
    }
  </style>
</head>

    const state = {

      enemyDebuff: 0,
      guard: 0,
      mpItems: 3,
      invincibleTurns: 0,
      hiddenHeroId: null,
      evasionBonus: 0,
      doubleDamageTurns: 0,
      enemyVulnerableTurns: 0,
      nextAttackMultiplier: 1,
      damageCutTurns: 0,
      damageCutRate: 0,
      enemyAttackMultiplier: 1,
      counterHeroId: null,
      counterRate: 0,
      onceUsed: {},
      actionCancelled: false,
      actedThisRound: [],
      defeatCount: 0,
      lastReward: "",
      storyStep: 0,
      storyLines: [],
      log: "",
      rewinding: false,
      ended: false
    };

    const el = {
      title: document.getElementById("title"),
      chapter: document.getElementById("chapter"),
      story: document.getElementById("story"),
      party: document.getElementById("partyField"),
      enemy: document.getElementById("enemyField"),
      turnBanner: document.getElementById("turnBanner"),
      rewind: document.getElementById("rewindOverlay"),
      defeatTitle: document.getElementById("defeatTitle"),
      defeatText: document.getElementById("defeatText"),
      retry: document.getElementById("retryBtn"),
      titleBack: document.getElementById("titleBtn"),
      roster: document.getElementById("roster"),
      skills: document.getElementById("skills"),
      turn: document.getElementById("turnLabel"),
      log: document.getElementById("log"),
      advance: document.getElementById("advanceBtn")
    };

    function startChapter() {
      const chapter = chapters[state.chapter];
      state.phase = "story";
      state.enemies = chapter.enemies.map((enemy) => ({ ...enemy, maxHp: enemy.hp, confused: 0 }));
      state.partyBuff = 0;
      state.enemyDebuff = 0;
      state.guard = 0;
      resetTurnEffects();
      state.actedThisRound = [];
      resetBattleLimitedSkills();
      const rewardLine = state.lastReward;
      state.log = rewardLine ? `${rewardLine} ${chapter.log}` : chapter.log;
      state.lastReward = "";
      state.storyStep = 0;
      state.storyLines = buildStoryLines(chapter, rewardLine);
      el.chapter.textContent = chapter.title;
      document.getElementById("arena").style.setProperty("--scene-image", `url("${chapter.scene || "assets/kid-room-battle.png"}")`);
      el.log.textContent = state.log;
      renderStoryLine();
      render();
    }

    function beginBattle() {
      if (state.ended) {
        resetGame();
        return;
      }
      if (state.phase === "story") {
        if (state.storyStep < state.storyLines.length - 1) {
          advanceStory();
          return;
        }
        state.phase = "battle";
        state.guard = 0;
        state.actedThisRound = [];
        state.log = `${aliveHero().name}の番。味方を切り替えて技を選ぼう。`;
        el.advance.textContent = "オート";
        el.story.innerHTML = `<span class="story-speaker">戦闘</span><div class="story-text">${chapters[state.chapter].title}</div><div class="story-next">下のコマンドで行動</div>`;
        render();
        return;
      }
      if (state.phase === "battle") {
        useSkill(effectiveSkillIds(heroes[state.active])[0]);
      }
    }

    function aliveHero() {
      if (isJoined(heroes[state.active]) && heroes[state.active].hp > 0) return heroes[state.active];
      const idx = heroes.findIndex((hero) => isJoined(hero) && hero.hp > 0);
      state.active = Math.max(0, idx);
      return heroes[state.active];
    }

    function isJoined(hero) {
      return hero.joinAt <= state.chapter;
    }

    function joinedHeroes() {
      return heroes.filter((hero) => isJoined(hero));
    }

    function buildStoryLines(chapter, rewardLine) {
      const lines = [];
      if (rewardLine) lines.push({ speaker: "回収", text: rewardLine });
      return lines.concat(chapter.lines || [{ speaker: "ストーリー", text: chapter.story }]);
    }

    function renderStoryLine() {
      const line = state.storyLines[state.storyStep] || { speaker: "ストーリー", text: "" };
      const canAdvance = state.storyStep < state.storyLines.length - 1;
      el.story.innerHTML = `<span class="story-speaker">${line.speaker}</span><div class="story-text">${line.text}</div><div class="story-next">${canAdvance ? "クリックで次へ" : "クリックで戦闘へ"}</div>`;
      el.advance.textContent = canAdvance ? "次へ" : "戦う";
    }

    function advanceStory() {
      if (state.phase !== "story") return;
      if (state.storyStep < state.storyLines.length - 1) {
        state.storyStep += 1;
        renderStoryLine();
      } else {
        beginBattle();
      }
    }

    function targetEnemy() {
      return state.enemies.find((enemy) => enemy.hp > 0);
    }

    function skillAvailable(id) {
      const skill = skillBook[id];
      return !skill.needs || state.recovered.includes(skill.needs);
    }

    function effectiveSkillIds(hero) {
      const ids = [...hero.skills];
      if (hero.id === "cat" && state.recovered.includes("四次元ポケット")) {
        joinedHeroes()
          .filter((member) => member.id !== "cat")
          .forEach((member) => ids.push(...member.skills));
      }
      return [...new Set(ids)];
    }

    function useSkill(id) {
      if (state.phase !== "battle") return;
      const hero = aliveHero();
      if (state.actedThisRound.includes(hero.id)) {
        state.log = `${hero.name}はこのターンもう行動した。`;
        render();
        return;
      }
      const skill = skillBook[id];
      if (!skill || !skillAvailable(id)) return;
      if (skill.once && state.onceUsed[id]) {
        state.log = "この特技はこの戦闘ではもう使えない。";
        render();
        return;
      }
      if (hero.mp < skill.cost) {
        state.log = `${hero.name}はMPが足りない。`;
        render();
        return;
      }
      hero.mp -= skill.cost;
      flashUnit(hero.id, "attack");
      state.actionCancelled = false;
      skill.use();
      if (state.actionCancelled) {
        state.actionCancelled = false;
        render();
        return;
      }
      markActed(hero);
      if (state.enemies.every((enemy) => enemy.hp <= 0)) {
        setTimeout(victory, 720);
        render();
        return;
      }
      if (roundComplete()) {
        state.log += " 味方全員が行動した。ターン終了。";
        startEnemyPhase();
      } else {
        selectNextPendingHero();
      }
      render();
    }

    function markActed(hero) {
      if (!state.actedThisRound.includes(hero.id)) state.actedThisRound.push(hero.id);
    }

    function canAct(hero) {
      return isJoined(hero) && hero.hp > 0 && !state.actedThisRound.includes(hero.id);
    }

    function roundComplete() {
      return joinedHeroes().filter((hero) => hero.hp > 0).every((hero) => state.actedThisRound.includes(hero.id));
    }

    function selectNextPendingHero() {
      const start = Math.max(0, state.active);
      for (let step = 1; step <= heroes.length; step++) {
        const next = (start + step) % heroes.length;
        if (canAct(heroes[next])) {
          state.active = next;
          return true;
        }
      }
      return false;
    }

    function startEnemyPhase() {
      if (state.phase !== "battle") return;
      if (!roundComplete()) {
        selectNextPendingHero();
        render();
        return;
      }
      state.phase = "enemy";
      render();
      setTimeout(() => {
        showTurnBanner("敵の攻撃");
        setTimeout(enemyTurn, 980);
      }, 650);
    }

    function hitEnemy(base, text) {
      const enemy = targetEnemy();
      if (!enemy) return;
      const damage = Math.max(4, Math.floor((base + state.partyBuff + random(-3, 4)) * consumeDamageMultiplier()));
      enemy.hp -= damage;
      flashUnit(enemy.name, "hit");
      popupUnit(enemy.name, damage, "bad");
      state.log = `${text} ${enemy.name}に${damage}ダメージ。`;
    }

    function songAttack() {
      const damage = Math.max(6, Math.floor((20 + state.partyBuff + random(-2, 5)) * consumeDamageMultiplier()));
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) {
          enemy.hp -= damage;
          enemy.confused = 2;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, damage, "bad");
        }
      });
      state.log = `ジャイアンの歌が部屋に響いた。敵全体に${damage}ダメージ、さらに混乱。`;
    }

    function attackAll(base, text) {
      const damage = Math.max(6, Math.floor((base + state.partyBuff + random(-3, 4)) * consumeDamageMultiplier()));
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) {
          enemy.hp -= damage;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, damage, "bad");
        }
      });
      state.log = `${text} 敵全体に${damage}ダメージ。`;
    }

    function healParty(amount, text) {
      joinedHeroes().forEach((hero) => {
        if (hero.hp > 0) {
          hero.hp = Math.min(hero.maxHp, hero.hp + amount);
          popupUnit(hero.id, `+${amount}`, "heal");
        }
      });
      state.log = text;
    }

    function healOne(amount, text) {
      const target = joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.hp < hero.maxHp)
        .sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "今は回復が必要な味方がいない。";
        return;
      }
      target.hp = Math.min(target.maxHp, target.hp + amount);
      popupUnit(target.id, `+${amount}`, "heal");
      state.log = `${text} ${target.name}のHPが${amount}回復。`;
    }

    function hideOneAlly() {
      const target = joinedHeroes()
        .filter((hero) => hero.hp > 0)
        .sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "姿を隠せる味方がいない。";
        state.actionCancelled = true;
        return;
      }
      state.hiddenHeroId = target.id;
      popupUnit(target.id, "隠れた", "heal");
      state.log = `ドラえもんがどこでもドアを開いた。${target.name}は1ターン姿を隠し、敵から狙われない。`;
    }

    function fullRecoverSelf(skillId, text) {
      if (!useOnce(skillId)) return;
      const hero = aliveHero();
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
      popupUnit(hero.id, "全回復", "heal");
      state.log = text;
    }

    function reviveOneFull(skillId) {
      if (!useOnce(skillId)) return;
      const target = joinedHeroes()
        .filter((hero) => hero.hp <= 0)
        .sort((a, b) => b.maxHp - a.maxHp)[0]
        || joinedHeroes().filter((hero) => hero.hp > 0 && hero.hp < hero.maxHp).sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "今はシャワータイムが必要な味方がいない。";
        state.onceUsed[skillId] = false;
        state.actionCancelled = true;
        return;
      }
      target.hp = target.maxHp;
      target.mp = target.maxMp;
      popupUnit(target.id, "復活", "heal");
      state.log = `静香のシャワータイム。${target.name}が復活してHPとMPが全回復。`;
    }

    function restoreMp() {
      if (state.mpItems <= 0) {
        state.log = "デンチキャンディはもう残っていない。";
        return;
      }
      const target = joinedHeroes()
        .filter((hero) => hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      state.mpItems -= 1;
      const amount = 8;
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `のび太がデンチキャンディを使った。${target.name}のMPが${amount}回復。残り${state.mpItems}個。`;
    }

    function restoreOneMpPercent(percent) {
      const target = joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      const amount = Math.max(1, Math.ceil(target.maxMp * percent));
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `チアガール手ぶくろで${target.name}を応援した。MPが${amount}回復。`;
    }

    function restoreOneMp(amount) {
      const target = joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `チアガール手ぶくろで${target.name}を応援した。MPが${amount}回復。`;
    }

    function buffParty(amount, text) {
      state.partyBuff = Math.min(10, state.partyBuff + amount);
      state.log = text;
    }

    function guardParty(text) {
      state.guard = Math.min(8, state.guard + 4);
      state.log = text;
    }

    function debuffEnemy(amount, text) {
      state.enemyDebuff = Math.min(8, state.enemyDebuff + amount);
      state.log = text;
    }

    function confuseEnemies(text) {
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) enemy.confused = 2;
      });
      state.log = text;
    }

    function stopEnemy() {
      const enemy = targetEnemy();
      if (!enemy) return;
      enemy.stopped = 1;
      flashUnit(enemy.name, "hit");
      popupUnit(enemy.name, "停止", "bad");
      state.log = `まあまあ棒で${enemy.name}をなだめた。次の行動を止める。`;
    }

    function consumeDamageMultiplier() {
      let multiplier = state.doubleDamageTurns > 0 ? 2 : 1;
      if (state.enemyVulnerableTurns > 0) multiplier *= 2;
      if (state.nextAttackMultiplier > 1) {
        multiplier *= state.nextAttackMultiplier;
        state.nextAttackMultiplier = 1;
      }
      return multiplier;
    }

    function resetTurnEffects() {
      state.invincibleTurns = 0;
      state.hiddenHeroId = null;
      state.evasionBonus = 0;
      state.doubleDamageTurns = 0;
      state.enemyVulnerableTurns = 0;
      state.nextAttackMultiplier = 1;
      state.damageCutTurns = 0;
      state.damageCutRate = 0;
      state.enemyAttackMultiplier = 1;
      state.counterHeroId = null;
      state.counterRate = 0;
    }

    function resetBattleLimitedSkills() {
      state.onceUsed = {};
    }

    function useOnce(skillId) {
      if (state.onceUsed[skillId]) {
        state.log = "この特技はこの戦闘ではもう使えない。";
        state.actionCancelled = true;
        return false;
      }
      state.onceUsed[skillId] = true;
      return true;
    }

    function enemyTurn() {
      if (state.phase !== "enemy") return;
      const livingEnemies = state.enemies.filter((enemy) => enemy.hp > 0);
      for (const enemy of livingEnemies) {
        if (enemy.stopped > 0) {
          enemy.stopped -= 1;
          state.log = `${enemy.name}はまあまあ棒で落ち着いて動けない。`;
          popupUnit(enemy.name, "停止", "bad");
          continue;
        }
        if (enemy.confused > 0 && Math.random() < 0.55) {
          enemy.confused -= 1;
          const other = livingEnemies.find((target) => target !== enemy) || enemy;
          const selfDamage = random(10, 16);
          other.hp -= selfDamage;
          state.log = `${enemy.name}は混乱して${other.name}に${selfDamage}ダメージ。`;
          flashUnit(other.name, "hit");
          popupUnit(other.name, selfDamage, "bad");
          continue;
        }
        const targets = joinedHeroes().filter((hero) => hero.hp > 0 && hero.id !== state.hiddenHeroId);
        if (!targets.length) break;
        const target = targets[random(0, targets.length - 1)];
        if (state.invincibleTurns > 0) {
          state.log = `${enemy.name}の逆襲。しかしどこでもドアの向こうへ逃げ切った。`;
          popupUnit(target.id, "無効", "heal");
          continue;
        }
        if (state.evasionBonus > 0 && Math.random() < state.evasionBonus) {
          state.log = `${enemy.name}の逆襲。${target.name}はタケコプターで回避した。`;
          popupUnit(target.id, "回避", "heal");
          continue;
        }
        const cut = state.damageCutTurns > 0 ? (1 - state.damageCutRate) : 1;
        const damage = Math.max(3, Math.floor((enemy.atk - state.enemyDebuff - state.guard + random(-2, 3)) * state.enemyAttackMultiplier * cut));
        target.hp -= damage;
        state.log = `${enemy.name}は${enemy.attackText || "逆襲した"}。${target.name}に${damage}ダメージ。`;
        if (state.damageCutTurns > 0) state.log += " 着せ替えカメラで軽減。";
        flashUnit(target.id, "hit");
        popupUnit(target.id, damage, "bad");
        if (target.id === state.counterHeroId && state.counterRate > 0) {
          const counter = Math.max(1, Math.floor(damage * state.counterRate));
          enemy.hp -= counter;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, counter, "bad");
          state.log += ` ヒラリマントで${counter}ダメージを返した。`;
        }
      }
      state.invincibleTurns = 0;
      state.hiddenHeroId = null;
      state.evasionBonus = 0;
      state.doubleDamageTurns = 0;
      state.enemyVulnerableTurns = 0;
      if (state.damageCutTurns > 0) {
        state.damageCutTurns -= 1;
        if (state.damageCutTurns <= 0) state.damageCutRate = 0;
      }
      state.enemyAttackMultiplier = 1;
      state.counterHeroId = null;
      state.counterRate = 0;
      if (state.enemies.every((enemy) => enemy.hp <= 0)) {
        setTimeout(victory, 720);
        render();
        return;
      }
      if (joinedHeroes().every((hero) => hero.hp <= 0)) {
        showDefeat();
        return;
      } else {
        state.actedThisRound = [];
        state.active = heroes.findIndex((hero) => isJoined(hero) && hero.hp > 0);
        state.phase = "battle";
        state.log += " 味方のターン。";
      }
      render();
    }

    function showDefeat() {
      if (state.rewinding) return;
      state.rewinding = true;
      state.phase = "defeat";
      state.defeatCount += 1;
      state.log = "敗北・・・。最後の力を振り絞って、次の行き先を選ぼう。";
      el.log.textContent = state.log;
      el.defeatTitle.textContent = "敗北・・・";
      el.defeatText.innerHTML = `やられた回数: ${state.defeatCount}回<br />タイトルに戻るか、この戦闘をHP・MP全回復でやり直せる。`;
      el.rewind.classList.add("show");
    }

    function restartBattleFromTimeMachine() {
      const chapter = chapters[state.chapter];
      state.enemies = chapter.enemies.map((enemy) => ({ ...enemy, maxHp: enemy.hp, confused: 0 }));
      joinedHeroes().forEach((hero) => {
        hero.hp = hero.maxHp;
        hero.mp = hero.maxMp;
      });
      state.partyBuff = 0;
      state.enemyDebuff = 0;
      state.guard = 0;
      resetTurnEffects();
      state.actedThisRound = [];
      resetBattleLimitedSkills();
      state.rewinding = false;
      state.phase = "battle";
      state.active = heroes.findIndex((hero) => isJoined(hero) && hero.hp > 0);
      state.log = "この戦闘を最初からやり直す。HPとMPは満タン。";
      el.story.innerHTML = `<span class="story-speaker">再戦</span><div class="story-text">${chapter.title}を最初からやり直す。HPとMPは全回復。</div><div class="story-next">下のコマンドで再戦</div>`;
      el.advance.textContent = "オート";
      el.rewind.classList.remove("show");
      render();
    }

    function backToTitle() {
      state.rewinding = false;
      el.rewind.classList.remove("show");
      el.title.classList.remove("hidden");
      resetGame();
    }

    function victory() {
      const chapter = chapters[state.chapter];
      chapter.enemies.forEach((enemy) => {
        if (enemy.drop && !state.recovered.includes(enemy.drop)) state.recovered.push(enemy.drop);
      });
      if (chapter.boss) {
        state.phase = "clear";
        state.ended = true;
        const rank = clearRank();
        state.log = `出木杉君の計画は止まった。やられた回数${state.defeatCount}回。クリアランク: ${rank}。`;
        el.story.innerHTML = `<span class="story-speaker">エンディング</span><div class="story-text">出木杉君は「完璧より、みんなで失敗して直す方が面白い」と少しだけ笑った。クリアランク: ${rank}</div><div class="story-next">クリックでタイトルへ</div>`;
        el.advance.textContent = "もう一度";
      } else {
        state.chapter += 1;
        const dropText = chapter.enemies.map((enemy) => enemy.drop).filter(Boolean).join("、");
        const rewardParts = [];
        if (dropText) rewardParts.push(`${dropText}を回収した。次の戦闘から新しい技が使える。`);
        if (chapter.join) rewardParts.push(chapter.join);
        state.lastReward = rewardParts.length
          ? rewardParts.join(" ")
          : `${chapter.title}を突破した。息を整えて次へ進もう。`;
        startChapter();
        el.log.textContent = state.log;
      }
      render();
    }

    function clearRank() {
      if (state.defeatCount === 0) return "S";
      if (state.defeatCount <= 2) return "A";
      if (state.defeatCount <= 5) return "B";
      return "C";
    }

    function nextAlive() {
      for (let step = 1; step <= heroes.length; step++) {
        const next = (state.active + step) % heroes.length;
        if (isJoined(heroes[next]) && heroes[next].hp > 0) {
          state.active = next;
          break;
        }
      }
    }

    function switchHero() {
      if (state.phase !== "battle") return;
      if (!selectNextPendingHero()) {
        state.log = "行動できる味方は全員動いた。ターン終了。";
        startEnemyPhase();
        render();
        return;
      }
      state.log = `行動順を変えた。次は${heroes[state.active].name}。`;
      render();
    }

    function render() {
      document.body.classList.toggle("compact-battle", ["battle", "enemy", "defeat"].includes(state.phase));
      renderParty();
      renderEnemies();
      renderRoster();
      renderSkills();
      const active = aliveHero();
      if (state.phase === "battle") {
        el.turn.textContent = `行動: ${active.name}`;
      } else if (state.phase === "enemy") {
        el.turn.textContent = "敵の攻撃";
      } else if (state.phase === "defeat") {
        el.turn.textContent = "敗北";
      } else {
        el.turn.textContent = "ストーリー";
      }
      el.log.textContent = state.log;
    }

    function renderParty() {
      el.party.innerHTML = heroes.filter((hero) => isJoined(hero)).map((hero, index) => {
        const heroIndex = heroes.indexOf(hero);
        const style = hero.shirt ? `style="--shirt:${hero.shirt}"` : "";
        const cls = ["unit", hero.cat ? "cat" : "person", heroIndex === state.active && state.phase === "battle" ? "active" : "", hero.id === state.hiddenHeroId ? "hidden" : "", hero.hp <= 0 ? "down" : ""].join(" ");
        return `<div class="${cls}" data-unit="${hero.id}" ${style}>${heroAvatar(hero)}<div class="nameplate">${hero.name}</div></div>`;
      }).join("");
    }

    function heroAvatar(hero) {
      return hero.cat
        ? `<div class="avatar"><div class="ear left"></div><div class="ear right"></div><div class="body"></div><div class="face"></div><div class="eye"></div><div class="pocket"></div></div>`
        : `<div class="avatar"><div class="hair"></div><div class="head"></div><div class="body"></div><div class="eye"></div></div>`;
    }

    function renderEnemies() {
      if (state.phase !== "battle" && state.phase !== "enemy") {
        el.enemy.innerHTML = "";
        return;
      }
      el.enemy.innerHTML = state.enemies.map((enemy) => {
        const hp = Math.max(0, enemy.hp);
        const hpWidth = Math.max(0, Math.min(100, hp / enemy.maxHp * 100));
        const hpBar = `<div class="enemy-hp"><div class="enemy-hp-fill" style="width:${hpWidth}%"></div><span class="enemy-hp-text">${hp}/${enemy.maxHp}</span></div>`;
        if (enemy.heroId) {
          const hero = heroes.find((member) => member.id === enemy.heroId);
          const cls = ["unit", hero?.cat ? "cat" : "person", enemy.hp <= 0 ? "down" : ""].join(" ");
          const style = hero?.shirt ? `style="--shirt:${hero.shirt}"` : "";
          return `<div class="${cls}" data-unit="${enemy.name}" ${style}>${hpBar}${heroAvatar(hero || {})}<div class="nameplate">${enemy.name}</div></div>`;
        }
        const cls = ["unit", "gadget", enemy.boss ? "boss" : "", enemy.hp <= 0 ? "down" : ""].join(" ");
        return `<div class="${cls}" data-unit="${enemy.name}" style="--gadget:${enemy.color}">${hpBar}<div class="avatar gadget-art ${enemy.kind || "air"}">${gadgetMarkup(enemy.kind)}</div><div class="nameplate">${enemy.name}</div></div>`;
      }).join("");
    }

    function gadgetMarkup(kind) {
      const faces = '<span class="eye"></span>';
      const parts = {
        air: '<span class="barrel"></span><span class="nozzle"></span>',
        mirror: '<span class="shine"></span>',
        mist: '<span class="cap"></span><span class="cloud"></span>',
        mic: '<span class="grill"></span><span class="handle"></span>',
        speaker: '<span class="cone"></span>',
        note: '<span class="paper"></span>'
      };
      return `${parts[kind] || parts.air}${faces}`;
    }

    function renderRoster() {
      el.roster.innerHTML = heroes.filter((hero) => isJoined(hero)).map((hero) => {
        const index = heroes.indexOf(hero);
        const hpWidth = Math.max(0, hero.hp / hero.maxHp * 100);
        const mpWidth = Math.max(0, hero.mp / hero.maxMp * 100);
        const acted = state.actedThisRound.includes(hero.id);
        const disabled = state.phase !== "battle" || hero.hp <= 0 || acted;
        return `<button class="card ${index === state.active ? "selected" : ""}" data-hero="${index}" ${disabled ? "disabled" : ""}>
          <strong>${hero.name}</strong>
          <div class="role">${acted ? "行動済み" : hero.role}</div>
          <div class="bar"><div class="fill" style="width:${hpWidth}%"></div></div>
          <div class="bar mp"><div class="fill" style="width:${mpWidth}%"></div></div>
        </button>`;
      }).join("");
      document.querySelectorAll("[data-hero]").forEach((button) => {
        button.addEventListener("click", () => {
          const next = Number(button.dataset.hero);
          if (!canAct(heroes[next])) return;
          state.active = next;
          state.log = `行動順を変えた。次は${heroes[state.active].name}。`;
          render();
        });
      });
    }

    function renderSkills() {
      const hero = heroes[state.active];
      el.skills.innerHTML = effectiveSkillIds(hero).map((id) => {
        const skill = skillBook[id];
        const available = skillAvailable(id);
        const acted = state.actedThisRound.includes(hero.id);
        const usedOnce = skill.once && state.onceUsed[id];
        const disabled = state.phase !== "battle" || hero.hp <= 0 || hero.mp < skill.cost || !available || acted || usedOnce;
        const lock = available ? (usedOnce ? "使用済み" : "") : "未回収";
        const borrowed = hero.id === "cat" && !hero.skills.includes(id) ? " / 借り道具" : "";
        const detail = `${skill.text}${borrowed}`;
        return `<button class="skill" data-skill="${id}" ${disabled ? "disabled" : ""}>
          <span>${skill.name} MP${skill.cost}</span>
          <small>${lock || detail}</small>
        </button>`;
      }).join("");
      document.querySelectorAll("[data-skill]").forEach((button) => button.addEventListener("click", () => useSkill(button.dataset.skill)));
    }

    function flashUnit(key, cls) {
      const safe = String(key).replace(/"/g, '\\"');
      setTimeout(() => {
        const node = document.querySelector(`[data-unit="${safe}"]`);
        if (!node) return;
        node.classList.add(cls);
        setTimeout(() => node.classList.remove(cls), 520);
      }, 20);
    }

    function popupUnit(key, value, type) {
      const safe = String(key).replace(/"/g, '\\"');
      setTimeout(() => {
        const node = document.querySelector(`[data-unit="${safe}"]`);
        if (!node) return;
        node.querySelectorAll(".damage-pop").forEach((existing) => existing.remove());
        const pop = document.createElement("span");
        pop.className = `damage-pop ${type || ""}`;
        pop.textContent = value;
        node.appendChild(pop);
        setTimeout(() => pop.remove(), 1120);
      }, 40);
    }

    function showTurnBanner(text) {
      el.turnBanner.textContent = text;
      el.log.textContent = `${text}！`;
      el.turnBanner.classList.remove("show");
      void el.turnBanner.offsetWidth;
      el.turnBanner.classList.add("show");
    }

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function resetGame() {
      heroes.forEach((hero) => {
        hero.hp = hero.maxHp;
        hero.mp = hero.maxMp;
      });
      state.chapter = 0;
      state.active = 0;
      state.recovered = [];
      state.mpItems = 3;
      state.defeatCount = 0;
      state.actedThisRound = [];
      state.lastReward = "";
      state.guard = 0;
      resetTurnEffects();
      state.rewinding = false;
      el.rewind.classList.remove("show");
      state.ended = false;
      startChapter();
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      el.title.classList.add("hidden");
    });
    document.getElementById("nextBtn").addEventListener("click", switchHero);
    el.retry.addEventListener("click", restartBattleFromTimeMachine);
    el.titleBack.addEventListener("click", backToTitle);
    el.advance.addEventListener("click", beginBattle);
    el.story.addEventListener("click", advanceStory);

    startChapter();
  </script>
</body>
</html>
