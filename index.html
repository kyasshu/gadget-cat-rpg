<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ミライポケットRPG 感情ガジェットの逆襲</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #fff7db;
      --muted: #bad8e6;
      --panel: rgba(8, 31, 46, 0.94);
      --panel2: rgba(18, 57, 72, 0.94);
      --line: #dff8ff;
      --gold: #ffd65d;
      --red: #ef6b62;
      --blue: #47b8ec;
      --green: #78dc88;
      --violet: #bc91ff;
      --shadow: rgba(0, 0, 0, 0.42);
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(4, 18, 28, 0.55), rgba(4, 18, 28, 0.92)),
        url("assets/kid-room-battle.png") center / cover fixed no-repeat;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button {
      border: 2px solid rgba(255, 247, 219, 0.9);
      border-radius: 7px;
      background: linear-gradient(180deg, #2f7d8c, #173d56);
      color: var(--ink);
      min-height: 42px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 900;
      line-height: 1.15;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.34);
    }

    button:hover:not(:disabled) { filter: brightness(1.13); }
    button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.34); }
    button:disabled { opacity: 0.42; cursor: not-allowed; }

    .shell {
      width: min(1220px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(460px, 1fr) auto;
      gap: 12px;
    }

    .box {
      border: 3px solid rgba(255, 247, 219, 0.92);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: 0 14px 34px var(--shadow), inset 0 0 0 2px rgba(71, 184, 236, 0.18);
    }

    header.box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    h1 {
      margin: 0;
      color: #fff0a8;
      font-size: clamp(1.12rem, 2.8vw, 1.8rem);
      line-height: 1.15;
      text-shadow: 0 3px 0 rgba(0,0,0,0.45);
    }

    .chapter {
      min-width: min(360px, 100%);
      padding: 7px 10px;
      border: 1px solid rgba(255, 247, 219, 0.5);
      border-radius: 7px;
      background: rgba(3, 17, 28, 0.48);
      color: var(--muted);
      font-weight: 800;
      line-height: 1.35;
      text-align: right;
    }

    .arena {
      position: relative;
      overflow: hidden;
      border: 4px solid #113b4d;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(14, 70, 90, 0.05), rgba(5, 18, 26, 0.48)),
        var(--scene-image, url("assets/kid-room-battle.png")) center / cover no-repeat;
      box-shadow: inset 0 0 0 3px rgba(255, 247, 219, 0.7), 0 14px 34px var(--shadow);
      min-height: 0;
    }

    .story-strip {
      position: absolute;
      left: 12px;
      top: 12px;
      width: min(440px, calc(100% - 24px));
      min-height: 118px;
      padding: 12px;
      border: 2px solid rgba(255, 247, 219, 0.82);
      border-radius: 8px;
      background: rgba(6, 25, 38, 0.82);
      line-height: 1.55;
      font-weight: 800;
      font-size: 1.05rem;
      z-index: 3;
      cursor: pointer;
      user-select: none;
    }

    .story-strip:hover {
      border-color: #fff1a0;
      background: rgba(6, 25, 38, 0.9);
    }

    .story-speaker {
      display: inline-block;
      margin-bottom: 5px;
      padding: 2px 8px;
      border: 1px solid rgba(255, 247, 219, 0.64);
      border-radius: 999px;
      background: rgba(255, 214, 93, 0.14);
      color: #fff1a0;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .story-text {
      min-height: 48px;
      font-size: 1.08rem;
    }

    .story-next {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 900;
      text-align: right;
    }

    .party-field,
    .enemy-field {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: clamp(7px, 1.5vw, 18px);
      padding: 0 20px;
    }

    .enemy-field { top: 25%; align-items: start; }
    .party-field { bottom: 8%; }

    .unit {
      position: relative;
      width: min(18%, 112px);
      min-width: 58px;
      display: grid;
      gap: 5px;
      justify-items: center;
      transition: transform 260ms ease, filter 260ms ease, opacity 260ms ease;
    }

    .unit.active { transform: translateY(-10px); filter: drop-shadow(0 0 12px rgba(255, 214, 93, 0.7)); }
    .unit.targetable { cursor: pointer; filter: drop-shadow(0 0 14px rgba(255, 214, 93, 0.88)); }
    .unit.chosen-target { filter: drop-shadow(0 0 16px rgba(156, 255, 159, 0.9)); }
    .unit.down { opacity: 0.48; filter: grayscale(0.7); }
    .unit.hidden { opacity: 0.28; filter: saturate(0.3) blur(1px); }
    .unit.hit { transform: translateX(-12px) scale(0.92); filter: brightness(1.9) saturate(1.25); }
    .unit.attack {
      transform: translateY(-18px) scale(1.12);
      filter: drop-shadow(0 0 18px rgba(255, 241, 160, 0.85));
      animation: enemyBlink 160ms steps(2, end) infinite;
    }

    .unit.attack::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 3px solid rgba(255, 241, 160, 0.8);
      border-radius: 50%;
      pointer-events: none;
      animation: attackShock 520ms ease-out forwards;
    }

    .damage-pop {
      position: absolute;
      left: 50%;
      top: -20%;
      z-index: 8;
      transform: translateX(-50%);
      color: #fff1a0;
      font-size: clamp(1rem, 3vw, 1.65rem);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 3px 0 #4b160e, 0 0 10px rgba(255, 214, 93, 0.9);
      pointer-events: none;
      animation: damageRise 1100ms ease-out forwards;
    }

    .damage-pop.heal {
      color: #b9ffb7;
      text-shadow: 0 3px 0 #104819, 0 0 10px rgba(120, 220, 136, 0.85);
    }

    .damage-pop.bad {
      color: #ff9d91;
      text-shadow: 0 3px 0 #4b160e, 0 0 10px rgba(239, 107, 98, 0.85);
    }

    .damage-pop.warn {
      min-width: max-content;
      padding: 4px 8px;
      border: 2px solid rgba(255, 247, 219, 0.92);
      border-radius: 999px;
      background: rgba(91, 25, 31, 0.92);
      color: #fff1a0;
      font-size: clamp(0.78rem, 2vw, 1.05rem);
      text-shadow: 0 2px 0 rgba(0,0,0,0.55);
      animation: attackNameRise 760ms ease-out forwards;
    }

    @keyframes damageRise {
      0% { opacity: 0; transform: translate(-50%, 10px) scale(0.85); }
      22% { opacity: 1; transform: translate(-50%, -4px) scale(1.16); }
      72% { opacity: 1; transform: translate(-50%, -34px) scale(1.04); }
      100% { opacity: 0; transform: translate(-50%, -52px) scale(0.96); }
    }

    @keyframes attackShock {
      0% { opacity: 0; transform: scale(0.65); }
      28% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.55); }
    }

    @keyframes enemyBlink {
      0% { opacity: 1; }
      50% { opacity: 0.42; }
      100% { opacity: 1; }
    }

    @keyframes attackNameRise {
      0% { opacity: 0; transform: translate(-50%, 8px) scale(0.9); }
      22% { opacity: 1; transform: translate(-50%, -4px) scale(1.06); }
      74% { opacity: 1; transform: translate(-50%, -18px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -28px) scale(0.98); }
    }

    .turn-banner {
      position: absolute;
      left: 50%;
      top: 47%;
      z-index: 9;
      min-width: min(360px, calc(100% - 32px));
      padding: 12px 18px;
      transform: translate(-50%, -50%) scale(0.96);
      border: 3px solid rgba(255, 247, 219, 0.96);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(91, 25, 31, 0.96), rgba(42, 12, 22, 0.96));
      color: #fff1a0;
      font-size: clamp(1.05rem, 3vw, 1.8rem);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 3px 0 rgba(0,0,0,0.5);
      box-shadow: 0 18px 38px rgba(0,0,0,0.42);
      opacity: 0;
      pointer-events: none;
    }

    .turn-banner.show {
      animation: bannerPulse 720ms ease-out forwards;
    }

    @keyframes bannerPulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
      72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.98); }
    }

    .rewind-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18), transparent 18%),
        linear-gradient(180deg, rgba(3, 14, 28, 0.62), rgba(3, 14, 28, 0.94));
      color: #fff1a0;
      pointer-events: none;
    }

    .rewind-overlay.show {
      display: grid;
      pointer-events: auto;
    }

    .rewind-overlay:not(.rewinding) .rewind-spiral {
      display: none;
    }

    .rewind-overlay.rewinding .defeat-actions {
      display: none;
    }

    .rewind-spiral {
      position: absolute;
      width: 165vmax;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from 0deg, rgba(92, 225, 255, 0.75) 0 10deg, transparent 10deg 24deg),
        repeating-radial-gradient(circle, transparent 0 5%, rgba(255, 241, 160, 0.26) 5.5% 6.8%, transparent 7.3% 11%);
      animation: rewindSpin 1.6s linear infinite;
      filter: blur(1px);
      opacity: 0.78;
    }

    .rewind-card {
      position: relative;
      width: min(620px, calc(100% - 36px));
      padding: clamp(18px, 4vw, 32px);
      border: 4px solid rgba(255, 247, 219, 0.95);
      border-radius: 8px;
      background: rgba(7, 31, 48, 0.9);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .rewind-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: clamp(1.2rem, 4vw, 2.1rem);
      text-shadow: 0 3px 0 rgba(0,0,0,0.55);
    }

    .rewind-card span {
      display: block;
      color: #d7f6ff;
      font-weight: 900;
      line-height: 1.55;
    }

    .defeat-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }

    .defeat-actions button {
      min-width: 180px;
    }

    @keyframes rewindSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(-360deg) scale(0.86); }
    }

    .nameplate {
      max-width: 100%;
      padding: 2px 7px;
      border: 2px solid rgba(255, 247, 219, 0.86);
      border-radius: 999px;
      background: rgba(6, 25, 38, 0.84);
      color: #fff7db;
      font-size: clamp(0.7rem, 1.4vw, 0.86rem);
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .enemy-hp {
      width: min(88px, 100%);
      height: 13px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 247, 219, 0.82);
      border-radius: 999px;
      background: rgba(7, 20, 28, 0.92);
      box-shadow: 0 2px 0 rgba(0,0,0,0.38);
    }

    .enemy-hp-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ef6b62, #ffd65d);
    }

    .enemy-hp-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff7db;
      font-size: 0.56rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,0.82);
    }

    .avatar {
      width: clamp(54px, 8vw, 92px);
      aspect-ratio: 1;
      position: relative;
      filter: drop-shadow(0 12px 8px rgba(0,0,0,0.4));
    }

    .person .head {
      position: absolute;
      left: 25%;
      top: 4%;
      width: 50%;
      height: 42%;
      border: 3px solid #2f1a12;
      border-radius: 50%;
      background: #f3c79a;
    }

    .person .hair {
      position: absolute;
      left: 21%;
      top: 1%;
      width: 58%;
      height: 30%;
      border-radius: 50% 50% 34% 34%;
      background: #2d211b;
      border: 2px solid #1a100d;
    }

    .avatar.nobio .glasses {
      position: absolute;
      left: 30%;
      top: 24%;
      width: 40%;
      height: 14%;
      z-index: 3;
      border-left: 1.5px solid #25201d;
      border-right: 1.5px solid #25201d;
    }

    .avatar.nobio .glasses::before,
    .avatar.nobio .glasses::after {
      content: "";
      position: absolute;
      top: 0;
      width: 42%;
      height: 100%;
      border: 1.5px solid #25201d;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .avatar.nobio .glasses::before { left: -4%; }
    .avatar.nobio .glasses::after { right: -4%; }

    .avatar.suneta .hair {
      left: 18%;
      top: -1%;
      width: 64%;
      height: 35%;
      border-radius: 0;
      clip-path: polygon(0 96%, 14% 22%, 28% 88%, 46% 4%, 62% 88%, 78% 20%, 100% 96%);
    }

    .avatar.shizumi .pigtail {
      position: absolute;
      top: 18%;
      width: 22%;
      height: 42%;
      border: 3px solid #1a100d;
      border-radius: 50%;
      background: #2d211b;
      z-index: 0;
    }

    .avatar.shizumi .pigtail.left { left: 8%; transform: rotate(-22deg); }
    .avatar.shizumi .pigtail.right { right: 8%; transform: rotate(22deg); }

    .unit.gouta {
      width: min(21%, 136px);
    }

    .avatar.gouta .body {
      left: 13%;
      width: 74%;
      border-radius: 16px 16px 9px 9px;
    }

    .avatar.gouta .head {
      left: 22%;
      width: 56%;
    }

    .person .body {
      position: absolute;
      left: 20%;
      bottom: 4%;
      width: 60%;
      height: 52%;
      border: 3px solid #2f1a12;
      border-radius: 13px 13px 9px 9px;
      background: var(--shirt, #e65d50);
    }

    .person .eye,
    .person .eye::after {
      content: "";
      position: absolute;
      top: 22%;
      left: 40%;
      width: 6%;
      height: 7%;
      border-radius: 50%;
      background: #1b1512;
      z-index: 2;
    }

    .person .eye::after { left: 230%; top: 0; width: 100%; height: 100%; }

    .cat .body {
      position: absolute;
      inset: 8% 9% 9%;
      border: 3px solid #082d45;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 40%, #c7f1ff 0 18%, var(--cat-color, #22a5e3) 19% 64%, color-mix(in srgb, var(--cat-color, #22a5e3), #052e46 28%) 65%);
    }

    .cat .face {
      position: absolute;
      inset: 28% 18% 16%;
      border: 2px solid #082d45;
      border-radius: 50%;
      background: #fff7e1;
    }

    .cat .ear {
      position: absolute;
      top: 4%;
      width: 26%;
      aspect-ratio: 1;
      border: 3px solid #082d45;
      border-radius: 50%;
      background: var(--cat-color, #23a4e3);
    }

    .cat .ear.left { left: 15%; }
    .cat .ear.right { right: 15%; }
    .cat .pocket {
      position: absolute;
      left: 38%;
      bottom: 16%;
      width: 24%;
      height: 14%;
      border: 2px solid #082d45;
      border-radius: 0 0 999px 999px;
      background: #ffe56b;
    }

    .cat .eye,
    .cat .eye::after {
      content: "";
      position: absolute;
      top: 35%;
      left: 38%;
      width: 8%;
      height: 10%;
      border-radius: 50%;
      background: #102a34;
      z-index: 2;
    }

    .cat .eye::after { left: 230%; top: 0; width: 100%; height: 100%; }

    .cat .hat,
    .cat .horn,
    .cat .scarf,
    .cat .fang,
    .cat .whisker {
      position: absolute;
      z-index: 4;
      pointer-events: none;
    }

    .cat .hat.borsalino {
      left: 20%;
      top: -2%;
      width: 60%;
      height: 18%;
      border: 2px solid #3a2413;
      border-radius: 999px 999px 6px 6px;
      background: #d7b46b;
      box-shadow: 0 7px 0 #7b4c20;
      transform: rotate(-8deg);
    }

    .cat .hat.chinese {
      left: 26%;
      top: -4%;
      width: 48%;
      height: 22%;
      border: 2px solid #4a1c12;
      border-radius: 50% 50% 14px 14px;
      background: #f6d85b;
      box-shadow: inset 0 -7px 0 #d84434;
    }

    .cat .hat.ribbon {
      left: 37%;
      top: -2%;
      width: 28%;
      height: 16%;
      background: #f04b7a;
      border-radius: 50%;
      box-shadow: -12px 3px 0 #f04b7a, 12px 3px 0 #f04b7a;
    }

    .cat .hat.mini-bell {
      left: 42%;
      top: 10%;
      width: 16%;
      height: 16%;
      border: 2px solid #5c360f;
      border-radius: 50%;
      background: #ffe56b;
      box-shadow: 0 12px 0 -5px #e7443e;
    }

    .cat .avatar.mini-dora {
      transform: scale(0.88);
      transform-origin: center bottom;
    }

    .cat .horn {
      top: 0;
      width: 18%;
      height: 28%;
      background: #f8f0c4;
      border: 2px solid #4b3020;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .cat .horn.left { left: 18%; transform: rotate(-18deg); }
    .cat .horn.right { right: 18%; transform: rotate(18deg); }

    .cat .scarf {
      left: 20%;
      bottom: 11%;
      width: 62%;
      height: 13%;
      border-radius: 999px;
      background: #2568e8;
      transform: rotate(6deg);
    }

    .cat .fang {
      top: 57%;
      width: 10%;
      height: 18%;
      background: #fff8e8;
      border: 1px solid #2d1d18;
      clip-path: polygon(50% 100%, 100% 0, 0 0);
    }

    .cat .fang.left { left: 42%; }
    .cat .fang.right { right: 42%; }

    .cat .whisker.gold {
      left: 18%;
      top: 54%;
      width: 64%;
      height: 8%;
      border-top: 4px solid #d8aa35;
      border-radius: 50%;
    }

    .gadget .avatar {
      animation: floaty 1.8s ease-in-out infinite alternate;
    }

    .gadget-art {
      border: 4px solid #2e1d11;
      background: radial-gradient(circle at 42% 34%, #fff0a8 0 10%, var(--gadget, #ff914d) 11% 54%, #642f46 55%);
      overflow: visible;
    }

    .gadget-art .eye,
    .gadget-art .eye::after {
      content: "";
      position: absolute;
      top: 36%;
      left: 31%;
      width: 13%;
      height: 13%;
      border-radius: 50%;
      background: #23120c;
      z-index: 3;
    }

    .gadget-art .eye::after { left: 210%; top: 0; width: 100%; height: 100%; }

    .gadget-art.air {
      border-radius: 50% 46% 42% 48%;
      background: linear-gradient(180deg, #ffb36a, #db563f 72%);
    }

    .gadget-art.air .barrel {
      position: absolute;
      left: 42%;
      top: -18%;
      width: 24%;
      height: 48%;
      border: 4px solid #2e1d11;
      border-radius: 999px;
      background: linear-gradient(180deg, #f7d06b, #d57b36);
      transform: rotate(28deg);
    }

    .gadget-art.air .nozzle {
      position: absolute;
      right: -16%;
      top: 37%;
      width: 34%;
      height: 22%;
      border: 4px solid #2e1d11;
      border-radius: 0 999px 999px 0;
      background: #ffe093;
    }

    .gadget-art.mirror {
      border-radius: 18px;
      background: linear-gradient(135deg, #bff4ff, #457dde 56%, #182e8a);
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.34);
      transform: rotate(-5deg);
    }

    .gadget-art.mirror .shine {
      position: absolute;
      left: 18%;
      top: 13%;
      width: 28%;
      height: 62%;
      border-radius: 999px;
      background: rgba(255,255,255,0.38);
      transform: rotate(30deg);
    }

    .gadget-art.mist {
      border-radius: 46% 54% 48% 52%;
      background: linear-gradient(180deg, #aef8ef, #48bfb2 68%, #1b6b86);
    }

    .gadget-art.mist .cap {
      position: absolute;
      left: 28%;
      top: -15%;
      width: 44%;
      height: 28%;
      border: 4px solid #2e1d11;
      border-radius: 999px 999px 8px 8px;
      background: #e7fff5;
    }

    .gadget-art.mist .cloud {
      position: absolute;
      right: -24%;
      top: 10%;
      width: 42%;
      height: 28%;
      border-radius: 999px;
      background: rgba(208,255,247,0.82);
      box-shadow: -22px 12px 0 rgba(208,255,247,0.58), -6px 26px 0 rgba(208,255,247,0.42);
    }

    .gadget-art.mic {
      border-radius: 999px 999px 34% 34%;
      background: linear-gradient(180deg, #ff8d79, #d7433e 62%, #6c2131);
    }

    .gadget-art.mic .grill {
      position: absolute;
      inset: 12% 20% 45%;
      border: 3px solid #2e1d11;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #f6d0be 0 5px, #8b3441 5px 9px);
    }

    .gadget-art.mic .handle {
      position: absolute;
      left: 38%;
      bottom: -22%;
      width: 24%;
      height: 42%;
      border: 4px solid #2e1d11;
      border-radius: 999px;
      background: #333b51;
    }

    .gadget-art.speaker {
      border-radius: 18px;
      background: linear-gradient(180deg, #ffd766, #d18028);
    }

    .gadget-art.speaker .cone {
      position: absolute;
      inset: 22%;
      border: 5px solid #2e1d11;
      border-radius: 50%;
      background: radial-gradient(circle, #33200f 0 14%, #ffefd1 15% 36%, #955927 37%);
    }

    .gadget-art.note {
      border-radius: 12px;
      background: linear-gradient(180deg, #9df2ff, #558ee9);
      transform: rotate(4deg);
    }

    .gadget-art.note .paper {
      position: absolute;
      inset: 12%;
      border: 3px solid #2e1d11;
      border-radius: 6px;
      background: repeating-linear-gradient(180deg, #fff5cc 0 10px, #9ac7e9 10px 13px);
    }

    .gadget.boss .avatar {
      border-color: #281445;
      box-shadow: 0 0 30px rgba(188, 145, 255, 0.72);
    }

    @keyframes floaty {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-9px) rotate(2deg); }
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .status-panel,
    .command-panel,
    .dialog {
      padding: 12px;
    }

    .roster {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
    }

    .card {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 3px;
      padding: 8px 7px;
      border: 1px solid rgba(255, 247, 219, 0.42);
      border-radius: 7px;
      background: rgba(5, 21, 31, 0.52);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--gold);
      box-shadow: inset 0 0 0 2px rgba(255, 214, 93, 0.35);
    }

    .card.targetable {
      border-color: #fff1a0;
      box-shadow: inset 0 0 0 2px rgba(255, 214, 93, 0.32), 0 0 10px rgba(255, 214, 93, 0.24);
    }

    .card.chosen-target {
      border-color: #9cff9f;
      box-shadow: inset 0 0 0 2px rgba(156, 255, 159, 0.4), 0 0 12px rgba(156, 255, 159, 0.28);
    }

    .card strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff2a9;
      font-size: 1rem;
    }

    .role {
      margin: 2px 0 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .bar {
      height: 21px;
      overflow: hidden;
      border: 1px solid rgba(255,247,219,0.7);
      border-radius: 999px;
      background: #06131d;
    }

    .fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), #d7f071);
      transition: width 220ms ease;
    }

    .fill.mid { background: linear-gradient(90deg, #ffd65d, #fff1a0); }
    .fill.low { background: linear-gradient(90deg, #ef6b62, #ff9d91); }
    .mp .fill { background: linear-gradient(90deg, var(--blue), #bcefff); }
    .mp .fill.mid { background: linear-gradient(90deg, #ffd65d, #fff1a0); }
    .mp .fill.low { background: linear-gradient(90deg, #ef6b62, #ff9d91); }

    .command-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .turnline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 900;
    }

    .turnline button small {
      display: block;
      margin-top: 1px;
      color: rgba(255, 247, 219, 0.82);
      font-size: 0.62rem;
      line-height: 1;
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .skill {
      display: grid;
      gap: 3px;
      text-align: left;
      font-size: 1rem;
    }

    .skill small {
      color: #d1edf5;
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .skill .heal-number {
      color: #9cff9f;
      font-weight: 900;
      text-shadow: 0 0 8px rgba(120, 220, 136, 0.45);
    }

    .dialog {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 104px;
    }

    .dialog p {
      margin: 0;
      line-height: 1.6;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .title {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(90deg, rgba(5, 19, 30, 0.92), rgba(5, 19, 30, 0.3)),
        url("assets/kid-room-battle.png") center / cover no-repeat;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .title.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      display: none;
    }

    .title-card {
      width: min(720px, 100%);
      display: grid;
      gap: 14px;
      padding: clamp(18px, 4vw, 34px);
      border: 4px solid rgba(255,247,219,0.95);
      border-radius: 8px;
      background: rgba(8, 31, 46, 0.93);
      box-shadow: 0 18px 46px rgba(0,0,0,0.48);
    }

    .title-card h2 {
      margin: 0;
      color: #fff0a8;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.03;
      text-shadow: 0 4px 0 rgba(0,0,0,0.42);
    }

    .title-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 900;
    }

    .title-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .record {
      padding: 9px 10px;
      border: 1px solid rgba(255, 247, 219, 0.5);
      border-radius: 7px;
      background: rgba(3, 17, 28, 0.52);
      color: #d1edf5;
      font-weight: 900;
      line-height: 1.4;
    }

    @media (max-width: 860px) {
      .shell { padding: 8px; grid-template-rows: auto minmax(430px, 58dvh) auto; }
      header.box { grid-template-columns: 1fr; }
      .chapter { text-align: left; }
      .hud { grid-template-columns: 1fr; }
      .roster { grid-template-columns: repeat(2, 1fr); }
      .story-strip { font-size: 0.9rem; }
      .dialog { grid-template-columns: 1fr; }
      .skills { grid-template-columns: 1fr; }
      .enemy-field { top: 30%; }
      .party-field { bottom: 7%; padding: 0 8px; }
      .unit { width: 19%; min-width: 50px; }
    }

    @media (max-width: 520px) {
      .avatar { width: 52px; }
      .nameplate { font-size: 0.66rem; padding-inline: 4px; }
      .roster { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px), (max-height: 720px) {
      body.compact-battle {
        overflow: hidden;
      }

      body.compact-battle .shell {
        height: 100dvh;
        min-height: 100dvh;
        padding: 4px;
        gap: 4px;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      }

      body.compact-battle header.box,
      body.compact-battle .story-strip,
      body.compact-battle .dialog {
        display: none;
      }

      body.compact-battle .arena {
        min-height: 0;
        border-width: 2px;
        border-radius: 6px;
        box-shadow: inset 0 0 0 2px rgba(255, 247, 219, 0.64);
      }

      body.compact-battle .enemy-field {
        top: 8%;
        gap: 5px;
        padding: 0 4px;
      }

      body.compact-battle .party-field {
        bottom: 3%;
        left: 0;
        right: 0;
        width: 100%;
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        justify-items: center;
        align-items: end;
        gap: 4px;
        padding: 0 4px;
      }

      body.compact-battle .unit {
        width: clamp(46px, 17vw, 68px);
        min-width: 0;
        gap: 2px;
      }

      body.compact-battle .avatar {
        width: clamp(42px, 14vw, 62px);
      }

      body.compact-battle .nameplate {
        max-width: 72px;
        padding: 1px 3px;
        border-width: 1px;
        font-size: 0.56rem;
      }

      body.compact-battle .enemy-hp {
        width: min(72px, 100%);
        height: 10px;
      }

      body.compact-battle .enemy-hp-text {
        font-size: 0.48rem;
      }

      body.compact-battle .hud {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: max-content minmax(0, 1fr);
        gap: 4px;
        min-height: 0;
        overflow: hidden;
        overscroll-behavior: contain;
      }

      body.compact-battle .status-panel,
      body.compact-battle .command-panel {
        padding: 3px;
        border-width: 2px;
        border-radius: 6px;
        min-height: 0;
        overflow: visible;
      }

      body.compact-battle .status-panel {
        display: block;
      }

      body.compact-battle .roster {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0;
        height: auto;
        align-content: stretch;
        align-items: stretch;
      }

      body.compact-battle .card {
        min-height: 32px;
        height: auto;
        padding: 2px 3px;
        border-radius: 5px;
        grid-template-rows: auto auto auto;
        gap: 1px;
      }

      body.compact-battle .card strong {
        font-size: 0.6rem;
      }

      body.compact-battle .role {
        display: none;
      }

      body.compact-battle .bar {
        height: 7px;
        min-height: 0;
        border-radius: 999px;
      }

      body.compact-battle .command-panel {
        gap: 6px;
        grid-template-rows: auto minmax(0, 1fr);
        align-content: start;
        overflow: hidden;
      }

      body.compact-battle .turnline {
        gap: 6px;
        font-size: 0.96rem;
      }

      body.compact-battle .turnline button {
        min-height: 38px;
        padding: 6px 10px;
        font-size: 0.9rem;
      }

      body.compact-battle .skills {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        min-height: 0;
        overflow-y: auto;
        align-content: start;
        grid-auto-rows: minmax(58px, auto);
        padding-right: 1px;
      }

      body.compact-battle .skill {
        min-height: 58px;
        padding: 8px;
        gap: 3px;
      }

      body.compact-battle .skill span {
        font-size: 0.9rem;
        line-height: 1.12;
      }

      body.compact-battle .skill small {
        display: block;
        font-size: 0.74rem;
        line-height: 1.2;
      }

      body.compact-battle .turn-banner {
        min-width: min(240px, calc(100% - 24px));
        padding: 8px 10px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="title" id="title">
    <section class="title-card">
      <h2>感情ガジェットの逆襲</h2>
      <p>のび太が「ジャイアンにいじめられたよー」と泣きついたところから始まる、5人同時バトルの短編RPG。</p>
      <div class="record" id="recordText">最高記録: まだクリアなし</div>
      <div class="title-actions">
        <button id="continueBtn">続きから</button>
        <button id="startBtn">はじめから</button>
      </div>
    </section>
  </div>

  <main class="shell">
    <header class="box">
      <h1>ミライポケットRPG 感情ガジェットの逆襲</h1>
      <div class="chapter" id="chapter">第1話 いじめられたのび太</div>
    </header>

    <section class="arena" id="arena">
      <div class="turn-banner" id="turnBanner">敵の攻撃</div>
      <div class="story-strip" id="story">
        のび太「ジャイアンにいじめられたよー！」 ドラえもんは、道具にやさしい心を教える「ココロスイッチ」を取り出した。
      </div>
      <div class="enemy-field" id="enemyField"></div>
      <div class="party-field" id="partyField"></div>
    </section>

    <section class="hud">
      <section class="box status-panel">
        <div class="roster" id="roster"></div>
      </section>
      <section class="box command-panel">
        <div class="turnline">
          <span id="turnLabel">行動: のび太</span>
          <button id="nextBtn">味方切替</button>
        </div>
        <div class="skills" id="skills"></div>
      </section>
    </section>

    <footer class="box dialog">
      <p id="log">「ココロスイッチ」を使った瞬間、部屋のガジェットたちがむくっと起き上がった。</p>
      <button id="advanceBtn">次へ</button>
    </footer>
  </main>

  <div class="rewind-overlay" id="rewindOverlay">
    <div class="rewind-spiral"></div>
    <div class="rewind-card">
      <strong id="defeatTitle">敗北・・・</strong>
      <span id="defeatText">最後の力を振り絞って、タイムマシンで過去に戻れる。</span>
      <div class="defeat-actions">
        <button id="retryBtn">この戦闘をやり直す</button>
        <button id="titleBtn">タイトルに戻る</button>
      </div>
    </div>
  </div>

  <script>
    const SAVE_KEY = "gadgetCatRpgSave";
    const RECORD_KEY = "gadgetCatRpgRecord";

    const heroes = [
      {
        id: "nobio", name: "のび太", role: "射撃", shirt: "#f1cf41", avatar: "nobio", hp: 100, maxHp: 100, mp: 30, maxMp: 30, joinAt: 0,
        skills: ["nap", "ataruGun", "nobitaAirCannon", "denkomaru"]
      },
      {
        id: "cat", name: "ドラえもん", role: "万能・回復", cat: true, hp: 100, maxHp: 100, mp: 30, maxMp: 30, joinAt: 0,
        skills: ["korobashiya", "anywhereDoor", "takecopter", "gourmetCloth", "fourDPocket", "bigLight"]
      },
      {
        id: "suneta", name: "スネ夫", role: "妨害・反撃", shirt: "#64b6e8", avatar: "suneta", hp: 100, maxHp: 100, mp: 30, maxMp: 30, joinAt: 3,
        skills: ["richBoast", "hirariMantle", "smallLight", "maamaaStick"]
      },
      {
        id: "shizumi", name: "静香", role: "回復・MP補助", shirt: "#f08cb4", avatar: "shizumi", hp: 100, maxHp: 100, mp: 30, maxMp: 30, joinAt: 5,
        skills: ["showerTime", "cheerGlove", "doctorBag", "dressCamera"]
      },
      {
        id: "gouta", name: "ジャイアン", role: "全体火力", shirt: "#e0664d", avatar: "gouta", hp: 100, maxHp: 100, mp: 30, maxMp: 30, joinAt: 7,
        skills: ["recital", "koekatamarin", "superGlove", "ultraDeluxePill"]
      }
    ];

    const skillBook = {
      nap: { name: "昼寝", cost: 0, text: "各戦闘1回 自分を全回復", once: true, use: () => fullRecoverSelf("nap", "のび太は一瞬で昼寝した。起きたらHPとMPが全回復。") },
      ataruGun: { name: "アタールガン", cost: 0, text: "敵単体小ダメージ", target: "enemy", use: (target) => hitEnemy(15, "のび太がアタールガンで狙い撃ちした。", target) },
      nobitaAirCannon: { name: "空気砲", cost: 5, text: "敵単体中ダメージ", needs: "のび太の空気砲", target: "enemy", use: (target) => {
        if (hasReward("空気砲強化")) {
          attackAll(25, "強化された空気砲が広がって敵をまとめて吹き飛ばした。");
          return;
        }
        hitEnemy(25, "のび太の空気砲が一点に空気弾を撃ち込んだ。", target);
      } },
      denkomaru: { name: "名刀電光丸", cost: 7, text: "敵単体大ダメージ+1ターン無敵", needs: "名刀電光丸", target: "enemy", use: (target) => {
        hitEnemy(42, "のび太が名刀電光丸で切り込んだ。", target);
        state.invincibleTurns = 1;
        state.log += hasReward("名刀電光丸強化") ? " さらに味方全体が1ターン無敵になる。" : " さらに1ターン無敵になる。";
      } },
      korobashiya: { name: "転ばし屋", cost: 0, text: "敵単体小ダメージ", target: "enemy", use: (target) => hitEnemy(14, "ドラえもんが転ばし屋を走らせた。", target) },
      anywhereDoor: { name: "どこでもドア", cost: 2, text: "味方1人が1ターン姿を隠す+MP5回復", target: "ally", use: (target) => {
        if (Array.isArray(target)) {
          hideManyAllies(target);
          return;
        }
        hideOneAlly(target);
      } },
      takecopter: { name: "タケコプター", cost: 4, text: "味方全体回避率30%アップ", use: () => {
        state.evasionBonus = Math.max(state.evasionBonus, 0.3);
        state.log = "タケコプターで全員が宙に浮いた。次の敵攻撃を避けやすくなる。";
      } },
      gourmetCloth: { name: "グルメテーブル掛け", cost: 4, text: "味方単体30回復", target: "ally", use: (target) => {
        const amount = hasReward("グルメテーブル掛け強化") ? 50 : 30;
        healOne(amount, "グルメテーブル掛けから温かいごはんが出た。", target);
      } },
      fourDPocket: { name: "四次元ポケット", cost: 0, text: "常時効果: 仲間の秘密道具だけ使える", needs: "四次元ポケット", passive: true, use: () => {
        state.log = "四次元ポケットが開いた。ドラえもんは仲間の道具も取り出せる。";
      } },
      bigLight: { name: "ビックライト", cost: 8, text: "このターン味方全体のダメージ2倍", needs: "ビックライト", use: () => {
        state.doubleDamageTurns = 1;
        state.log = "ビックライトでみんなの攻撃が巨大化する。このターンの味方ダメージが2倍。";
      } },
      richBoast: { name: "金持ち自慢", cost: 0, text: "このターン敵全体の被ダメージ2倍", use: () => {
        state.enemyVulnerableTurns = 1;
        state.log = "スネ夫が金持ち自慢をした。敵全体がムキになって、このターン受けるダメージが2倍。";
      } },
      hirariMantle: { name: "ヒラリマント", cost: 0, text: "小ダメージ+受けた半分を反撃", target: "enemy", use: (target) => {
        hitEnemy(12, "スネ夫がヒラリマントでかわしながら当てた。", target);
        state.counterHeroId = "suneta";
        state.counterRate = hasReward("ヒラリマント強化") ? 1 : 0.5;
        state.counterReflectStun = hasReward("ヒラリマント強化");
        state.log += hasReward("ヒラリマント強化")
          ? " このターン、受けたダメージと行動不能をそのまま返す。"
          : " このターン、受けたダメージの半分を返す。";
      } },
      smallLight: { name: "スモールライト", cost: 5, text: "1ターン敵攻撃力半分", needs: "スモールライト", use: () => {
        state.enemyAttackMultiplier = 0.5;
        state.log = "スモールライトで敵が小さくなった。次の敵攻撃力が半分。";
      } },
      maamaaStick: { name: "まあまあ棒", cost: 20, text: "敵単体1ターン行動停止", needs: "まあまあ棒", target: "enemy", use: (target) => stopEnemy(target) },
      showerTime: { name: "シャワータイム", cost: 0, text: "各戦闘1回 味方単体を復活+全回復", once: true, target: "reviveAlly", use: (target) => reviveOneFull("showerTime", target) },
      doctorBag: { name: "お医者さんカバン", cost: 8, text: "味方全体30回復", needs: "お医者さんカバン", use: () => healParty(30, "お医者さんカバンでみんなを手当てした。") },
      cheerGlove: { name: "チアガール手ぶくろ", cost: 0, text: "味方単体MP10回復", target: "ally", use: (target) => {
        if (hasReward("チアガール手ぶくろ強化")) {
          restoreOneMpAndHp(10, 30, target);
          return;
        }
        restoreOneMp(10, target);
      } },
      dressCamera: { name: "着せ替えカメラ", cost: 15, text: "味方全体3ターンダメージ50%カット", needs: "着せ替えカメラ", use: () => {
        state.damageCutTurns = 3;
        state.damageCutRate = 0.5;
        state.log = "着せ替えカメラで守りの衣装にチェンジ。3ターン、受けるダメージを50%カット。";
      } },
      recital: { name: "リサイタル", cost: 0, text: "各戦闘1回 次の攻撃威力2倍", once: true, use: () => {
        if (!useOnce("recital")) return;
        state.nextAttackMultiplier = 2;
        state.log = "ジャイアンがリサイタルを始めた。次の攻撃の威力が2倍になる。";
      } },
