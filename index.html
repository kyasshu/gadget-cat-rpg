    function renderStoryLine() {
      const line = state.storyLines[state.storyStep] || { speaker: "ストーリー", text: "" };
      const canAdvance = state.storyStep < state.storyLines.length - 1;
      el.story.innerHTML = `<span class="story-speaker">${line.speaker}</span><div class="story-text">${line.text}</div><div class="story-next">${canAdvance ? "クリックで次へ" : "クリックで戦闘へ"}</div>`;
      el.advance.textContent = canAdvance ? "次へ" : "戦う";
    }

    function advanceStory() {
      if (state.phase !== "story") return;
      if (state.storyStep < state.storyLines.length - 1) {
        state.storyStep += 1;
        renderStoryLine();
      } else {
        beginBattle();
      }
    }

    function targetEnemy() {
      return state.enemies.find((enemy) => enemy.hp > 0);
    }

    function skillAvailable(id) {
      const skill = skillBook[id];
      return !skill.needs || state.recovered.includes(skill.needs);
    }

    function hasReward(name) {
      return state.recovered.includes(name);
    }

    function skillCost(id) {
      if (id === "denkomaru" && hasReward("名刀電光丸強化")) return 20;
      return skillBook[id]?.cost || 0;
    }

    function skillText(id) {
      if (id === "anywhereDoor" && hasReward("どこでもドア強化")) return "味方3人まで姿を隠す+MP5回復";
      if (id === "nobitaAirCannon" && hasReward("空気砲強化")) return "敵全体中ダメージ";
      if (id === "gourmetCloth" && hasReward("グルメテーブル掛け強化")) return "味方単体50回復";
      if (id === "denkomaru" && hasReward("名刀電光丸強化")) return "敵単体大ダメージ+味方全体1ターン無敵";
      if (id === "hirariMantle" && hasReward("ヒラリマント強化")) return "小ダメージ+受けた同値と行動不能を反撃";
      if (id === "cheerGlove" && hasReward("チアガール手ぶくろ強化")) return "味方単体MP10+HP30回復";
      if (id === "koekatamarin" && hasReward("コエカタマリン強化")) return "敵全体30ダメージ";
      return skillBook[id]?.text || "";
    }

    function skillTarget(id) {
      if (id === "anywhereDoor" && hasReward("どこでもドア強化")) return "allyMulti3";
      if (id === "nobitaAirCannon" && hasReward("空気砲強化")) return null;
      return skillBook[id]?.target || null;
    }

    function effectiveSkillIds(hero) {
      const ids = [...hero.skills];
      if (hero.id === "cat" && state.recovered.includes("四次元ポケット")) {
        joinedHeroes()
          .filter((member) => member.id !== "cat")
          .forEach((member) => {
            member.skills
              .filter((id) => !characterSkillIds.has(id) && !passiveSkillIds.has(id))
              .forEach((id) => ids.push(id));
          });
      }
      return [...new Set(ids)].sort((a, b) => Number(characterSkillIds.has(a)) - Number(characterSkillIds.has(b)));
    }

    function useSkill(id) {
      if (state.phase !== "battle") return;
      const hero = aliveHero();
      state.pendingTarget = null;
      if (state.actedThisRound.includes(hero.id)) {
        state.log = `${hero.name}はこのターンもう行動した。`;
        render();
        return;
      }
      if (isHeroStunned(hero)) {
        state.log = `${hero.name}は行動不能で動けない。`;
        render();
        return;
      }
      const skill = skillBook[id];
      if (!skill || !skillAvailable(id)) return;
      if (skill.passive) {
        state.log = `${skill.name}は常時効果。コマンドとしては使わない。`;
        render();
        return;
      }
      if (skill.once && state.onceUsed[id]) {
        state.log = "この特技はこの戦闘ではもう使えない。";
        render();
        return;
      }
      const cost = skillCost(id);
      const targetType = skillTarget(id);
      if (hero.mp < cost) {
        state.log = `${hero.name}はMPが足りない。`;
        render();
        return;
      }
      if (targetType) {
        const candidates = targetCandidates(skill, targetType);
        if (!candidates.length) {
          state.log = `${skill.name}を使える対象がいない。`;
          render();
          return;
        }
        if (candidates.length > 1) {
          state.pendingTarget = { skillId: id, heroIndex: state.active, type: targetType, selectedIds: [] };
          state.log = targetType === "allyMulti3" ? `${skill.name}の対象を3人まで選んでください。` : `${skill.name}の対象を選んでください。`;
          render();
          return;
        }
        executeSkill(id, candidates[0]);
        return;
      }
      executeSkill(id, null);
    }

    function executeSkill(id, target) {
      if (state.phase !== "battle") return;
      const pending = state.pendingTarget;
      if (pending && pending.skillId === id) state.active = pending.heroIndex;
      const hero = aliveHero();
      const skill = skillBook[id];
      if (!skill || !skillAvailable(id)) return;
      if (skill.passive) {
        state.pendingTarget = null;
        state.log = `${skill.name}は常時効果。コマンドとしては使わない。`;
        render();
        return;
      }
      if (state.actedThisRound.includes(hero.id)) {
        state.pendingTarget = null;
        state.log = `${hero.name}はこのターンもう行動した。`;
        render();
        return;
      }
      if (isHeroStunned(hero)) {
        state.pendingTarget = null;
        state.log = `${hero.name}は行動不能で動けない。`;
        render();
        return;
      }
      if (skill.once && state.onceUsed[id]) {
        state.pendingTarget = null;
        state.log = "この特技はこの戦闘ではもう使えない。";
        render();
        return;
      }
      const cost = skillCost(id);
      if (hero.mp < cost) {
        state.pendingTarget = null;
        state.log = `${hero.name}はMPが足りない。`;
        render();
        return;
      }
      state.pendingTarget = null;
      hero.mp -= cost;
      flashUnit(hero.id, "attack");
      state.actionCancelled = false;
      skill.use(target);
      if (state.actionCancelled) {
        state.actionCancelled = false;
        render();
        return;
      }
      markActed(hero);
      if (state.enemies.every((enemy) => enemy.hp <= 0)) {
        setTimeout(victory, 720);
        render();
        saveGame();
        return;
      }
      if (roundComplete()) {
        state.log += " 味方全員が行動した。ターン終了。";
        startEnemyPhase();
      } else {
        selectNextPendingHero();
      }
      render();
      saveGame();
    }

    function targetCandidates(skill, targetType = skill.target) {
      if (targetType === "enemy") return state.enemies.filter((enemy) => enemy.hp > 0);
      if (targetType === "reviveAlly") {
        return joinedHeroes().filter((hero) => hero.hp <= 0 || hero.hp < hero.maxHp || hero.mp < hero.maxMp);
      }
      if (targetType === "ally" || targetType === "allyMulti3") return joinedHeroes().filter((hero) => hero.hp > 0);
      return [];
    }

    function candidateId(candidate) {
      return candidate.id || candidate.name;
    }

    function selectTarget(type, index) {
      const pending = state.pendingTarget;
      if (!pending || state.phase !== "battle") return false;
      const skill = skillBook[pending.skillId];
      if (!skill) return false;
      const normalizedType = ["reviveAlly", "allyMulti3"].includes(pending.type) ? "ally" : pending.type;
      if (type !== normalizedType) return false;
      const candidates = targetCandidates(skill, pending.type);
      const target = type === "enemy" ? state.enemies[index] : heroes[index];
      if (!target || !candidates.some((candidate) => candidateId(candidate) === candidateId(target))) {
        state.log = "その対象には使えない。別の対象を選んでください。";
        render();
        return false;
      }
      if (pending.type === "allyMulti3") {
        if (!pending.selectedIds.includes(target.id)) pending.selectedIds.push(target.id);
        const maxTargets = Math.min(3, candidates.length);
        if (pending.selectedIds.length < maxTargets) {
          state.log = `どこでもドアの対象を選択中: ${pending.selectedIds.length}/${maxTargets}人。`;
          render();
          return true;
        }
        const selectedHeroes = pending.selectedIds.map((id) => heroes.find((hero) => hero.id === id)).filter(Boolean);
        executeSkill(pending.skillId, selectedHeroes);
        return true;
      }
      executeSkill(pending.skillId, target);
      return true;
    }

    function cancelTargetSelection() {
      if (!state.pendingTarget || state.phase !== "battle") return false;
      const skillName = skillBook[state.pendingTarget.skillId]?.name || "技";
      state.pendingTarget = null;
      state.log = `${skillName}の対象選択をキャンセルした。`;
      render();
      return true;
    }

    function markActed(hero) {
      if (!state.actedThisRound.includes(hero.id)) state.actedThisRound.push(hero.id);
    }

    function isHeroStunned(hero) {
      return state.stunnedHeroIds.includes(hero.id);
    }

    function canAct(hero) {
      return isJoined(hero) && hero.hp > 0 && !state.actedThisRound.includes(hero.id) && !isHeroStunned(hero);
    }

    function roundComplete() {
      const actors = joinedHeroes().filter((hero) => hero.hp > 0 && !isHeroStunned(hero));
      return actors.length === 0 || actors.every((hero) => state.actedThisRound.includes(hero.id));
    }

    function selectNextPendingHero() {
      const start = Math.max(0, state.active);
      for (let step = 1; step <= heroes.length; step++) {
        const next = (start + step) % heroes.length;
        if (canAct(heroes[next])) {
          state.active = next;
          return true;
        }
      }
      return false;
    }

    function startEnemyPhase() {
      if (state.phase !== "battle") return;
      state.pendingTarget = null;
      if (!roundComplete()) {
        selectNextPendingHero();
        render();
        return;
      }
      state.stunnedHeroIds = [];
      state.phase = "enemy";
      render();
      setTimeout(() => {
        showTurnBanner("敵の攻撃");
        setTimeout(enemyTurn, 980);
      }, 650);
    }

    function hitEnemy(base, text, chosenEnemy) {
      const enemy = chosenEnemy || targetEnemy();
      if (!enemy) return;
      if (enemy.evasionRate && Math.random() < enemy.evasionRate) {
        flashUnit(enemy.name, "attack");
        popupUnit(enemy.name, "回避", "heal");
        state.log = `${enemy.name}はひらりと回避した。`;
        return;
      }
      if (enemy.immortal) {
        flashUnit(enemy.name, "attack");
        popupUnit(enemy.name, "無敵", "heal");
        state.log = `${enemy.name}には攻撃が通らない。`;
        return;
      }
      const damage = Math.max(4, Math.floor((base + state.partyBuff + random(-3, 4)) * consumeDamageMultiplier()));
      enemy.hp -= damage;
      flashUnit(enemy.name, "hit");
      popupUnit(enemy.name, damage, "bad");
      state.log = `${text} ${enemy.name}に${damage}ダメージ。`;
      if (enemy.hp > 0 && enemy.counterRate > 0) {
        const hero = aliveHero();
        const counter = Math.max(1, Math.floor(damage * enemy.counterRate));
        popupUnit(enemy.name, "ひらり！", "warn");
        hero.hp -= counter;
        flashUnit(hero.id, "hit");
        popupUnit(hero.id, counter, "bad");
        state.log += ` ${enemy.name}が受け流して${counter}ダメージを返した。`;
      }
    }

    function songAttack() {
      const damage = Math.max(6, Math.floor((20 + state.partyBuff + random(-2, 5)) * consumeDamageMultiplier()));
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) {
          enemy.hp -= damage;
          enemy.confused = 2;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, damage, "bad");
        }
      });
      state.log = `ジャイアンの歌が部屋に響いた。敵全体に${damage}ダメージ、さらに混乱。`;
    }

    function attackAll(base, text) {
      const damage = Math.max(6, Math.floor((base + state.partyBuff + random(-3, 4)) * consumeDamageMultiplier()));
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) {
          if (enemy.evasionRate && Math.random() < enemy.evasionRate) {
            popupUnit(enemy.name, "回避", "heal");
            return;
          }
          if (enemy.immortal) {
            popupUnit(enemy.name, "無敵", "heal");
            return;
          }
          enemy.hp -= damage;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, damage, "bad");
          if (enemy.hp > 0 && enemy.counterRate > 0) {
            const hero = aliveHero();
            const counter = Math.max(1, Math.floor(damage * enemy.counterRate));
            popupUnit(enemy.name, "ひらり！", "warn");
            hero.hp -= counter;
            flashUnit(hero.id, "hit");
            popupUnit(hero.id, counter, "bad");
          }
        }
      });
      state.log = `${text} 敵全体に${damage}ダメージ。`;
    }

    function healParty(amount, text) {
      joinedHeroes().forEach((hero) => {
        if (hero.hp > 0) {
          hero.hp = Math.min(hero.maxHp, hero.hp + amount);
          popupUnit(hero.id, `+${amount}`, "heal");
        }
      });
      state.log = text;
    }

    function healOne(amount, text, chosenHero) {
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.hp < hero.maxHp)
        .sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "今は回復が必要な味方がいない。";
        return;
      }
      target.hp = Math.min(target.maxHp, target.hp + amount);
      popupUnit(target.id, `+${amount}`, "heal");
      state.log = `${text} ${target.name}のHPが${amount}回復。`;
    }

    function hideOneAlly(chosenHero) {
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp > 0)
        .sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "姿を隠せる味方がいない。";
        state.actionCancelled = true;
        return;
      }
      state.hiddenHeroIds = [target.id];
      state.hiddenHeroId = target.id;
      const mpGain = Math.min(5, target.maxMp - target.mp);
      target.mp = Math.min(target.maxMp, target.mp + 5);
      popupUnit(target.id, "隠れた", "heal");
      if (mpGain > 0) setTimeout(() => popupUnit(target.id, `MP+${mpGain}`, "heal"), 180);
      state.log = `ドラえもんがどこでもドアを開いた。${target.name}は1ターン姿を隠し、敵から狙われない。MPも${mpGain}回復。`;
    }

    function hideManyAllies(targets) {
      const selected = targets.filter((hero) => hero && hero.hp > 0).slice(0, 3);
      if (!selected.length) {
        state.log = "姿を隠せる味方がいない。";
        state.actionCancelled = true;
        return;
      }
      state.hiddenHeroIds = selected.map((hero) => hero.id);
      state.hiddenHeroId = selected[0].id;
      selected.forEach((hero, index) => {
        const mpGain = Math.min(5, hero.maxMp - hero.mp);
        hero.mp = Math.min(hero.maxMp, hero.mp + 5);
        setTimeout(() => popupUnit(hero.id, mpGain > 0 ? `MP+${mpGain}` : "隠れた", "heal"), index * 140);
      });
      state.log = `強化どこでもドアを開いた。${selected.map((hero) => hero.name).join("、")}は1ターン姿を隠し、MPも5回復。`;
    }

    function fullRecoverSelf(skillId, text) {
      if (!useOnce(skillId)) return;
      const hero = aliveHero();
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
      popupUnit(hero.id, "全回復", "heal");
      state.log = text;
    }

    function reviveOneFull(skillId, chosenHero) {
      if (!useOnce(skillId)) return;
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp <= 0)
        .sort((a, b) => b.maxHp - a.maxHp)[0]
        || joinedHeroes().filter((hero) => hero.hp > 0 && hero.hp < hero.maxHp).sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      if (!target) {
        state.log = "今はシャワータイムが必要な味方がいない。";
        state.onceUsed[skillId] = false;
        state.actionCancelled = true;
        return;
      }
      target.hp = target.maxHp;
      target.mp = target.maxMp;
      popupUnit(target.id, "復活", "heal");
      state.log = `静香のシャワータイム。${target.name}が復活してHPとMPが全回復。`;
    }

    function restoreMp() {
      if (state.mpItems <= 0) {
        state.log = "デンチキャンディはもう残っていない。";
        return;
      }
      const target = joinedHeroes()
        .filter((hero) => hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      state.mpItems -= 1;
      const amount = 8;
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `のび太がデンチキャンディを使った。${target.name}のMPが${amount}回復。残り${state.mpItems}個。`;
    }

    function restoreOneMpPercent(percent, chosenHero) {
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      const amount = Math.max(1, Math.ceil(target.maxMp * percent));
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `チアガール手ぶくろで${target.name}を応援した。MPが${amount}回復。`;
    }

    function restoreOneMp(amount, chosenHero) {
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp > 0 && hero.mp < hero.maxMp)
        .sort((a, b) => (a.mp / a.maxMp) - (b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今はMP回復が必要な味方がいない。";
        return;
      }
      target.mp = Math.min(target.maxMp, target.mp + amount);
      popupUnit(target.id, `MP+${amount}`, "heal");
      state.log = `チアガール手ぶくろで${target.name}を応援した。MPが${amount}回復。`;
    }

    function restoreOneMpAndHp(mpAmount, hpAmount, chosenHero) {
      const target = chosenHero || joinedHeroes()
        .filter((hero) => hero.hp > 0 && (hero.mp < hero.maxMp || hero.hp < hero.maxHp))
        .sort((a, b) => (a.hp / a.maxHp + a.mp / a.maxMp) - (b.hp / b.maxHp + b.mp / b.maxMp))[0];
      if (!target) {
        state.log = "今は応援が必要な味方がいない。";
        return;
      }
      target.mp = Math.min(target.maxMp, target.mp + mpAmount);
      target.hp = Math.min(target.maxHp, target.hp + hpAmount);
      popupUnit(target.id, `MP+${mpAmount}`, "heal");
      setTimeout(() => popupUnit(target.id, `+${hpAmount}`, "heal"), 160);
      state.log = `強化チアガール手ぶくろで${target.name}を応援した。MPが${mpAmount}、HPが${hpAmount}回復。`;
    }

    function buffParty(amount, text) {
      state.partyBuff = Math.min(10, state.partyBuff + amount);
      state.log = text;
    }

    function guardParty(text) {
      state.guard = Math.min(8, state.guard + 4);
      state.log = text;
    }

    function debuffEnemy(amount, text) {
      state.enemyDebuff = Math.min(8, state.enemyDebuff + amount);
      state.log = text;
    }

    function confuseEnemies(text) {
      state.enemies.forEach((enemy) => {
        if (enemy.hp > 0) enemy.confused = 2;
      });
      state.log = text;
    }

    function stopEnemy(chosenEnemy) {
      const enemy = chosenEnemy || targetEnemy();
      if (!enemy) return;
      enemy.stopped = 1;
      flashUnit(enemy.name, "hit");
      popupUnit(enemy.name, "停止", "bad");
      state.log = `まあまあ棒で${enemy.name}をなだめた。次の行動を止める。`;
    }

    function consumeDamageMultiplier() {
      let multiplier = state.doubleDamageTurns > 0 ? 2 : 1;
      if (state.enemyVulnerableTurns > 0) multiplier *= 2;
      const hero = aliveHero();
      if (hero && state.weakenedHeroIds.includes(hero.id)) {
        multiplier *= 0.5;
        state.weakenedHeroIds = state.weakenedHeroIds.filter((id) => id !== hero.id);
      }
      if (state.nextAttackMultiplier > 1) {
        multiplier *= state.nextAttackMultiplier;
        state.nextAttackMultiplier = 1;
      }
      return multiplier;
    }

    function resetTurnEffects() {
      state.invincibleTurns = 0;
      state.hiddenHeroId = null;
      state.hiddenHeroIds = [];
      state.evasionBonus = 0;
      state.doubleDamageTurns = 0;
      state.enemyVulnerableTurns = 0;
      state.nextAttackMultiplier = 1;
      state.damageCutTurns = 0;
      state.damageCutRate = 0;
      state.enemyAttackMultiplier = 1;
      state.counterHeroId = null;
      state.counterRate = 0;
      state.counterReflectStun = false;
    }

    function resetBattleLimitedSkills() {
      state.onceUsed = {};
    }

    function useOnce(skillId) {
      if (state.onceUsed[skillId]) {
        state.log = "この特技はこの戦闘ではもう使えない。";
        state.actionCancelled = true;
        return false;
      }
      state.onceUsed[skillId] = true;
      return true;
    }

    function enemyAction(enemy) {
      if (enemy.attackPattern === "dorami") {
        return Math.random() < 0.45
          ? { name: "リボン衝撃波", scope: "allFixed", damage: 15 }
          : { name: enemy.attackName || "ドラミパンチ", scope: "single", damage: enemy.fixedDamage ?? enemy.atk };
      }
      if (enemy.attackPattern === "pocket") {
        return Math.random() < 0.5
          ? { name: "何がでるかな", scope: "single", damage: 20 }
          : { name: "何がでるかな", scope: "allFixed", damage: 10 };
      }
      if (enemy.attackPattern === "airCannon") {
        return Math.random() < 0.5
          ? { name: enemy.attackName || "逆襲", scope: "allFixed", damage: 20 }
          : { name: enemy.attackName || "逆襲", scope: "allFixed", damage: 25 };
      }
      return {
        name: enemy.attackName || enemy.attackText || "逆襲",
        scope: enemy.attackScope || "single",
        damage: enemy.fixedDamage ?? null,
        effect: enemy.attackEffect || null
      };
    }

    function stunHero(hero, enemyName) {
      if (!state.stunnedHeroIds.includes(hero.id)) state.stunnedHeroIds.push(hero.id);
      popupUnit(hero.id, "行動不能", "bad");
      state.log += ` ${hero.name}は${enemyName}の効果で1ターン行動不能。`;
    }

    function missingSummonedMiniDora(summoner) {
      return state.enemies.find((enemy) => enemy.summonedBy === summoner.name && enemy.hp <= 0);
    }

    async function resummonMiniDora(summoner, defeatedMiniDora) {
      const attackName = "ミニドラ再召喚";
      await telegraphEnemyAttack(summoner, attackName);
      defeatedMiniDora.hp = defeatedMiniDora.maxHp || 100;
      defeatedMiniDora.confused = 0;
      defeatedMiniDora.stopped = 0;
      flashUnit(defeatedMiniDora.name, "heal");
      popupUnit(defeatedMiniDora.name, "復帰", "heal");
      state.log = `${summoner.name}は1ターン使って${defeatedMiniDora.name}を再度召喚した。`;
      render();
      await wait(260);
    }

    function repairDoramiActionLock() {
      const sewashi = state.enemies.find((enemy) => enemy.name === "セワシ" && enemy.hp > 0);
      const dorami = state.enemies.find((enemy) => enemy.name === "ドラミ" && enemy.hp > 0);
      if (!sewashi || !dorami || !dorami.stopped) return false;
      dorami.stopped = 0;
      popupUnit(dorami.name, "復帰", "heal");
      state.log = "セワシがいるため、ドラミの行動不能は解除された。";
      return true;
    }

    function supportHealTarget(enemy) {
      if (enemy.healTargetIncludes) {
        return state.enemies
          .filter((target) => target.name.includes(enemy.healTargetIncludes) && target.hp > 0 && target.hp < target.maxHp)
          .sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0];
      }
      if (enemy.supportFor) return state.enemies.find((target) => target.name === enemy.supportFor && target.hp > 0);
      return null;
    }

    async function handleTimedVanishEnemy(enemy) {
      const attackName = enemy.attackName || "逆襲";
      await telegraphEnemyAttack(enemy, attackName);
      const activeTargets = joinedHeroes().filter((hero) => hero.hp > 0 && !isHeroHidden(hero));
      const damage = enemy.fixedDamage ?? enemy.atk;
      activeTargets.forEach((hero) => {
        hero.hp -= damage;
        flashUnit(hero.id, "hit");
        popupUnit(hero.id, damage, "bad");
      });
      enemy.vanishTurns = (enemy.vanishTurns ?? enemy.vanishAfterTurns) - 1;
      if (enemy.vanishTurns <= 0) {
        enemy.hp = 0;
        state.log = `${enemy.name}は${attackName}を放った。味方全体に${damage}ダメージ。5ターンの無敵が切れて消滅した。`;
        popupUnit(enemy.name, "消滅", "bad");
      } else {
        state.log = `${enemy.name}は${attackName}を放った。味方全体に${damage}ダメージ。消滅まで残り${enemy.vanishTurns}ターン。`;
      }
      render();
      await wait(260);
    }

    async function enemyTurn() {
      if (state.phase !== "enemy") return;
      const livingEnemies = state.enemies
        .filter((enemy) => enemy.hp > 0)
        .flatMap((enemy) => Array.from({ length: enemy.actionsPerTurn || 1 }, () => enemy));
      const stoppedThisTurn = new Set();
      repairDoramiActionLock();
      for (const enemy of livingEnemies) {
        if (enemy.hp <= 0 || stoppedThisTurn.has(enemy)) continue;
        if (enemy.summonsMiniDora) {
          const defeatedMiniDora = missingSummonedMiniDora(enemy);
          if (defeatedMiniDora) {
            await resummonMiniDora(enemy, defeatedMiniDora);
            continue;
          }
        }
        if (enemy.stopped > 0) {
          enemy.stopped -= 1;
          stoppedThisTurn.add(enemy);
          state.log = `${enemy.name}はまあまあ棒で落ち着いて動けない。`;
          popupUnit(enemy.name, "停止", "bad");
          continue;
        }
        if (enemy.vanishAfterTurns) {
          await handleTimedVanishEnemy(enemy);
          continue;
        }
        if (enemy.confused > 0 && Math.random() < 0.55) {
          enemy.confused -= 1;
          const other = livingEnemies.find((target) => target !== enemy) || enemy;
          const selfDamage = random(10, 16);
          other.hp -= selfDamage;
          state.log = `${enemy.name}は混乱して${other.name}に${selfDamage}ダメージ。`;
          flashUnit(other.name, "hit");
          popupUnit(other.name, selfDamage, "bad");
          continue;
        }
        if (enemy.supportFor || enemy.healTargetIncludes) {
          const supportTarget = supportHealTarget(enemy);
          const shouldHeal = enemy.healTargetIncludes ? !!supportTarget : (supportTarget && Math.random() < 0.55);
          if (shouldHeal) {
            const attackName = enemy.healAttackName || `ドラミを直す`;
            await telegraphEnemyAttack(enemy, attackName);
            supportTarget.hp = Math.min(supportTarget.maxHp, supportTarget.hp + enemy.healAmount);
            flashUnit(supportTarget.name, "heal");
            popupUnit(supportTarget.name, `+${enemy.healAmount}`, "heal");
            state.log = `${enemy.name}は${attackName}。${supportTarget.name}を${enemy.healAmount}回復。`;
            render();
            await wait(260);
            continue;
          }
          if (enemy.healTargetIncludes) {
            state.log = `${enemy.name}は診察相手を探している。`;
            render();
            await wait(160);
            continue;
          }
        }
        const targets = joinedHeroes().filter((hero) => hero.hp > 0 && !isHeroHidden(hero));
        if (!targets.length) break;
        const action = enemyAction(enemy);
        const attackName = action.name;
        await telegraphEnemyAttack(enemy, attackName);
        if (state.phase !== "enemy") return;
        const activeTargets = joinedHeroes().filter((hero) => hero.hp > 0 && !isHeroHidden(hero));
        if (!activeTargets.length) break;
        if (state.invincibleTurns > 0) {
          state.log = `${enemy.name}の${attackName}。しかし無敵で防いだ。`;
          activeTargets.forEach((hero) => popupUnit(hero.id, "無効", "heal"));
          continue;
        }
        if (action.scope === "allSmall" || action.scope === "allFixed") {
          const victims = activeTargets;
          const cut = state.damageCutTurns > 0 ? (1 - state.damageCutRate) : 1;
          const baseDamage = action.damage ?? Math.floor(enemy.atk * 0.65);
          const damage = Math.max(3, Math.floor((baseDamage - state.enemyDebuff - state.guard + (action.damage === null ? random(-2, 3) : 0)) * state.enemyAttackMultiplier * cut));
          victims.forEach((hero) => {
            if (state.evasionBonus > 0 && Math.random() < state.evasionBonus) {
              popupUnit(hero.id, "回避", "heal");
              return;
            }
            hero.hp -= damage;
            flashUnit(hero.id, "hit");
            popupUnit(hero.id, damage, "bad");
            if (action.effect === "stun" && hero.hp > 0) stunHero(hero, enemy.name);
            if (action.effect === "weak" && hero.hp > 0) {
              if (!state.weakenedHeroIds.includes(hero.id)) state.weakenedHeroIds.push(hero.id);
              popupUnit(hero.id, "弱体", "bad");
            }
            if (hero.id === state.counterHeroId && state.counterRate > 0) {
              const counter = Math.max(1, Math.floor(damage * state.counterRate));
              enemy.hp -= counter;
              flashUnit(enemy.name, "hit");
              popupUnit(enemy.name, counter, "bad");
              if (action.effect === "stun" && state.counterReflectStun) {
                enemy.stopped = 1;
                popupUnit(enemy.name, "停止", "bad");
              }
            }
          });
          state.log = `${enemy.name}は${attackName}を放った。味方全体に${damage}ダメージ。`;
          if (state.damageCutTurns > 0) state.log += " 着せ替えカメラで軽減。";
          render();
          await wait(260);
          continue;
        }
        const target = activeTargets[random(0, activeTargets.length - 1)];
        if (action.effect === "mpHalf") {
          const before = target.mp;
          target.mp = Math.floor(target.mp / 2);
          state.log = `${enemy.name}は${attackName}。${target.name}のMPを${before - target.mp}減らした。`;
          flashUnit(target.id, "hit");
          popupUnit(target.id, "MP半減", "bad");
          render();
          await wait(260);
          continue;
        }
        if (state.evasionBonus > 0 && Math.random() < state.evasionBonus) {
          state.log = `${enemy.name}の${attackName}。${target.name}はタケコプターで回避した。`;
          popupUnit(target.id, "回避", "heal");
          continue;
        }
        const cut = state.damageCutTurns > 0 ? (1 - state.damageCutRate) : 1;
        const baseDamage = action.damage ?? enemy.atk;
        const damage = Math.max(0, Math.floor((baseDamage - state.enemyDebuff - state.guard + (action.damage === null ? random(-2, 3) : 0)) * state.enemyAttackMultiplier * cut));
        if (damage > 0) target.hp -= damage;
        state.log = `${enemy.name}は${attackName}。${target.name}に${damage}ダメージ。`;
        if (state.damageCutTurns > 0) state.log += " 着せ替えカメラで軽減。";
        flashUnit(target.id, "hit");
        popupUnit(target.id, damage > 0 ? damage : "行動不能", "bad");
        if (action.effect === "stun" && target.hp > 0) stunHero(target, enemy.name);
        if (action.effect === "weak" && target.hp > 0) {
          if (!state.weakenedHeroIds.includes(target.id)) state.weakenedHeroIds.push(target.id);
          popupUnit(target.id, "弱体", "bad");
          state.log += ` ${target.name}の次の与ダメージが半分になる。`;
        }
        if (target.id === state.counterHeroId && state.counterRate > 0) {
          const counter = Math.max(1, Math.floor(damage * state.counterRate));
          enemy.hp -= counter;
          flashUnit(enemy.name, "hit");
          popupUnit(enemy.name, counter, "bad");
          state.log += ` ヒラリマントで${counter}ダメージを返した。`;
          if (action.effect === "stun" && state.counterReflectStun) {
            enemy.stopped = 1;
            popupUnit(enemy.name, "停止", "bad");
            state.log += ` 行動不能も${enemy.name}へ返した。`;
          }
        }
      }
      state.invincibleTurns = 0;
      state.hiddenHeroId = null;
      state.hiddenHeroIds = [];
      state.evasionBonus = 0;
      state.doubleDamageTurns = 0;
      state.enemyVulnerableTurns = 0;
      if (state.damageCutTurns > 0) {
        state.damageCutTurns -= 1;
        if (state.damageCutTurns <= 0) state.damageCutRate = 0;
      }
      state.enemyAttackMultiplier = 1;
      state.counterHeroId = null;
      state.counterRate = 0;
      if (state.enemies.every((enemy) => enemy.hp <= 0)) {
        setTimeout(victory, 720);
        render();
        return;
      }
      if (joinedHeroes().every((hero) => hero.hp <= 0)) {
        showDefeat();
        return;
      } else {
        state.actedThisRound = [];
        state.pendingTarget = null;
        state.active = heroes.findIndex((hero) => canAct(hero)) >= 0 ? heroes.findIndex((hero) => canAct(hero)) : heroes.findIndex((hero) => isJoined(hero) && hero.hp > 0);
        state.phase = "battle";
        state.log += " 味方のターン。";
      }
      render();
      saveGame();
    }

    function showDefeat() {
      if (state.rewinding) return;
      state.rewinding = true;
      state.phase = "defeat";
      state.pendingTarget = null;
      state.defeatCount += 1;
      state.log = "敗北・・・。最後の力を振り絞って、次の行き先を選ぼう。";
      el.log.textContent = state.log;
      el.defeatTitle.textContent = "敗北・・・";
      el.defeatText.innerHTML = `やられた回数: ${state.defeatCount}回<br />タイトルに戻るか、この戦闘をHP・MP全回復でやり直せる。`;
      el.rewind.classList.remove("rewinding");
      el.rewind.classList.add("show");
      saveGame();
    }

    function retryBattleWithTimeMachine() {
      if (state.phase !== "defeat") return;
      el.defeatTitle.textContent = "タイムマシン起動";
      el.defeatText.innerHTML = "時間が巻き戻っている・・・";
      el.rewind.classList.add("rewinding");
      setTimeout(restartBattleFromTimeMachine, 1000);
    }

    function restartBattleFromTimeMachine() {
      const chapter = chapters[state.chapter];
      state.enemies = chapter.enemies.map((enemy) => ({ ...decorateEnemy(enemy), maxHp: enemy.hp, confused: 0 }));
      joinedHeroes().forEach((hero) => {
        hero.hp = hero.maxHp;
        hero.mp = hero.maxMp;
      });
      state.partyBuff = 0;
      state.enemyDebuff = 0;
      state.guard = 0;
      resetTurnEffects();
      state.actedThisRound = [];
      state.stunnedHeroIds = [];
      state.weakenedHeroIds = [];
      state.pendingTarget = null;
      resetBattleLimitedSkills();
      state.rewinding = false;
      state.phase = "battle";
      state.active = heroes.findIndex((hero) => isJoined(hero) && hero.hp > 0);
      state.log = "この戦闘を最初からやり直す。HPとMPは満タン。";
      el.story.innerHTML = `<span class="story-speaker">再戦</span><div class="story-text">${chapter.title}を最初からやり直す。HPとMPは全回復。</div><div class="story-next">下のコマンドで再戦</div>`;
      el.advance.textContent = "オート";
      el.rewind.classList.remove("show", "rewinding");
      render();
      saveGame();
    }

    function backToTitle() {
      state.rewinding = false;
      el.rewind.classList.remove("show", "rewinding");
      el.title.classList.remove("hidden");
      resetGame();
    }

    function victory() {
      state.pendingTarget = null;
      const chapter = chapters[state.chapter];
      chapter.enemies.forEach((enemy) => {
        const drops = Array.isArray(enemy.drop) ? enemy.drop : (enemy.drop ? [enemy.drop] : []);
        drops.forEach((drop) => {
          if (drop && !state.recovered.includes(drop)) state.recovered.push(drop);
        });
      });
      if (chapter.boss && !chapter.secret && state.defeatCount === 0 && chapters[state.chapter + 1]?.secret) {
        state.chapter += 1;
        state.lastReward = "戦闘不能なしでここまで来た。秘密の最後の壁が開いた。";
        startChapter();
        el.log.textContent = state.log;
      } else if (chapter.boss) {
        state.phase = "clear";
        state.ended = true;
        const rank = clearRank();
        updateRecord();
        clearSavedGame();
        const endingText = chapter.secret
          ? "ドラえもんズは大きくうなずいた。最後の壁を越えたみんなに、未来から拍手が届いた。"
          : "出木杉君は「完璧より、みんなで失敗して直す方が面白い」と少しだけ笑った。";
        state.log = `大事件は止まった。やられた回数${state.defeatCount}回。クリアランク: ${rank}。`;
        el.story.innerHTML = `<span class="story-speaker">エンディング</span><div class="story-text">${endingText}クリアランク: ${rank}</div><div class="story-next">クリックでタイトルへ</div>`;
        el.advance.textContent = "もう一度";
      } else {
        state.chapter += 1;
        const dropText = chapter.enemies
          .flatMap((enemy) => Array.isArray(enemy.drop) ? enemy.drop : (enemy.drop ? [enemy.drop] : []))
          .filter(Boolean)
          .join("、");
        const rewardParts = [];
        if (dropText) rewardParts.push(`${dropText}を回収した。次の戦闘から新しい技が使える。`);
        if (chapter.join) rewardParts.push(chapter.join);
        state.lastReward = rewardParts.length
          ? rewardParts.join(" ")
          : `${chapter.title}を突破した。息を整えて次へ進もう。`;
        startChapter();
        el.log.textContent = state.log;
      }
      render();
      updateTitleState();
    }

    function clearRank() {
      if (state.defeatCount === 0) return "S";
      if (state.defeatCount <= 2) return "A";
      if (state.defeatCount <= 5) return "B";
      return "C";
    }

    function recordData() {
      try {
        return JSON.parse(localStorage.getItem(RECORD_KEY)) || { clears: 0, bestDefeats: null };
      } catch {
        return { clears: 0, bestDefeats: null };
      }
    }

    function updateRecord() {
      const record = recordData();
      record.clears = (record.clears || 0) + 1;
      if (record.bestDefeats === null || state.defeatCount < record.bestDefeats) {
        record.bestDefeats = state.defeatCount;
      }
      localStorage.setItem(RECORD_KEY, JSON.stringify(record));
    }

    function saveGame() {
      if (!el.title.classList.contains("hidden")) return;
      if (state.ended || state.phase === "clear") return;
      const data = {
        chapter: state.chapter,
        active: state.active,
        phase: state.phase === "enemy" || state.phase === "defeat" ? "battle" : state.phase,
        enemies: state.enemies,
        recovered: state.recovered,
        mpItems: state.mpItems,
        defeatCount: state.defeatCount,
        lastReward: state.lastReward,
        storyStep: state.storyStep,
        storyLines: state.storyLines,
        log: state.log,
        actedThisRound: state.actedThisRound,
        stunnedHeroIds: state.stunnedHeroIds,
        weakenedHeroIds: state.weakenedHeroIds,
        heroes: heroes.map((hero) => ({ id: hero.id, hp: hero.hp, mp: hero.mp }))
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      updateTitleState();
    }

    function clearSavedGame() {
      localStorage.removeItem(SAVE_KEY);
      updateTitleState();
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return false;
      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        clearSavedGame();
        return false;
      }
      heroes.forEach((hero) => {
        const saved = data.heroes?.find((item) => item.id === hero.id);
        hero.hp = saved ? Math.min(hero.maxHp, Math.max(0, saved.hp)) : hero.maxHp;
        hero.mp = saved ? Math.min(hero.maxMp, Math.max(0, saved.mp)) : hero.maxMp;
      });
      state.chapter = Math.min(Math.max(0, data.chapter || 0), chapters.length - 1);
      state.active = data.active || 0;
      state.phase = data.phase || "story";
      state.enemies = (data.enemies?.length ? data.enemies : chapters[state.chapter].enemies).map((enemy) => ({ ...decorateEnemy(enemy), maxHp: enemy.maxHp || enemy.hp, confused: enemy.confused || 0 }));
      state.recovered = data.recovered || [];
      state.mpItems = data.mpItems ?? 3;
      state.defeatCount = data.defeatCount || 0;
      state.lastReward = data.lastReward || "";
      state.storyStep = data.storyStep || 0;
      state.storyLines = data.storyLines?.length ? data.storyLines : buildStoryLines(chapters[state.chapter], state.lastReward);
      state.log = data.log || chapters[state.chapter].log;
      state.actedThisRound = data.actedThisRound || [];
      state.stunnedHeroIds = data.stunnedHeroIds || [];
      state.weakenedHeroIds = data.weakenedHeroIds || [];
      state.ended = false;
      state.rewinding = false;
      state.pendingTarget = null;
      resetTurnEffects();
      resetBattleLimitedSkills();
      el.chapter.textContent = chapters[state.chapter].title;
      document.getElementById("arena").style.setProperty("--scene-image", `url("${chapters[state.chapter].scene || "assets/kid-room-battle.png"}")`);
      if (state.phase === "story") {
        renderStoryLine();
      } else {
        state.phase = "battle";
        el.advance.textContent = "オート";
        el.story.innerHTML = `<span class="story-speaker">再開</span><div class="story-text">${chapters[state.chapter].title}</div><div class="story-next">下のコマンドで行動</div>`;
      }
      el.title.classList.add("hidden");
      render();
      return true;
    }

    function updateTitleState() {
      const record = recordData();
      const hasSave = !!localStorage.getItem(SAVE_KEY);
      el.continue.disabled = !hasSave;
      el.record.textContent = record.clears
        ? `最高記録: 全滅${record.bestDefeats}回 / クリア${record.clears}回`
        : "最高記録: まだクリアなし";
    }

    function nextAlive() {
      for (let step = 1; step <= heroes.length; step++) {
        const next = (state.active + step) % heroes.length;
        if (isJoined(heroes[next]) && heroes[next].hp > 0) {
          state.active = next;
          break;
        }
      }
    }

    function switchHero() {
      if (state.phase !== "battle") return;
      if (state.pendingTarget) {
        if (state.pendingTarget.type === "allyMulti3" && state.pendingTarget.selectedIds.length > 0) {
          const selectedHeroes = state.pendingTarget.selectedIds.map((id) => heroes.find((hero) => hero.id === id)).filter(Boolean);
          executeSkill(state.pendingTarget.skillId, selectedHeroes);
          return;
        }
        state.log = "先に技の対象を選んでください。";
        render();
        return;
      }
      if (!selectNextPendingHero()) {
        state.log = "行動できる味方は全員動いた。ターン終了。";
        startEnemyPhase();
        render();
        return;
      }
      state.log = `行動順を変えた。次は${heroes[state.active].name}。`;
      render();
    }

    function render() {
      document.body.classList.toggle("compact-battle", ["battle", "enemy", "defeat"].includes(state.phase));
      renderParty();
      renderEnemies();
      renderRoster();
      renderSkills();
      const active = aliveHero();
      if (state.phase === "battle") {
        el.turn.textContent = `行動: ${active.name}`;
      } else if (state.phase === "enemy") {
        el.turn.textContent = "敵の攻撃";
      } else if (state.phase === "defeat") {
        el.turn.textContent = "敗北";
      } else {
        el.turn.textContent = "ストーリー";
      }
      el.next.innerHTML = state.pendingTarget?.type === "allyMulti3" ? "決定" : "味方切替<small>行動順を変更できる</small>";
      el.log.textContent = state.log;
    }

    function renderParty() {
      el.party.innerHTML = heroes.filter((hero) => isJoined(hero)).map((hero, index) => {
        const heroIndex = heroes.indexOf(hero);
        const style = hero.shirt ? `style="--shirt:${hero.shirt}"` : "";
        const allyTargetable = isTargetableHero(hero);
        const cls = ["unit", hero.cat ? "cat" : "person", hero.avatar || "", heroIndex === state.active && state.phase === "battle" ? "active" : "", isHeroHidden(hero) ? "hidden" : "", hero.hp <= 0 ? "down" : "", allyTargetable ? "targetable" : "", isChosenTarget(hero) ? "chosen-target" : ""].join(" ");
        return `<div class="${cls}" data-unit="${hero.id}" ${allyTargetable ? `data-ally-target="${heroIndex}"` : ""} ${style}>${heroAvatar(hero)}<div class="nameplate">${hero.name}</div></div>`;
      }).join("");
      document.querySelectorAll("[data-ally-target]").forEach((node) => {
        node.addEventListener("click", () => selectTarget("ally", Number(node.dataset.allyTarget)));
      });
    }

    function heroAvatar(hero) {
      const accessory = hero.accessory ? accessoryMarkup(hero.accessory) : "";
      return hero.cat
        ? `<div class="avatar ${hero.miniDora ? "mini-dora" : ""}">${accessory}<div class="ear left"></div><div class="ear right"></div><div class="body"></div><div class="face"></div><div class="eye"></div><div class="pocket"></div></div>`
        : `<div class="avatar ${hero.avatar || ""}">${personAccessoryMarkup(hero.avatar)}<div class="hair"></div><div class="head"></div><div class="body"></div><div class="eye"></div></div>`;
    }

    function personAccessoryMarkup(avatar) {
      const parts = {
        nobio: '<div class="glasses"></div>',
        shizumi: '<div class="pigtail left"></div><div class="pigtail right"></div>'
      };
      return parts[avatar] || "";
    }

    function accessoryMarkup(accessory) {
      const parts = {
        borsalino: '<div class="hat borsalino"></div>',
        chinese: '<div class="hat chinese"></div>',
        ribbon: '<div class="hat ribbon"></div>',
        miniBell: '<div class="hat mini-bell"></div>',
        horns: '<div class="horn left"></div><div class="horn right"></div>',
        wolf: '<div class="scarf"></div><div class="fang left"></div><div class="fang right"></div>',
        goldWhisker: '<div class="whisker gold"></div>'
      };
      return parts[accessory] || "";
    }

    function renderEnemies() {
      if (state.phase !== "battle" && state.phase !== "enemy") {
        el.enemy.innerHTML = "";
        return;
      }
      el.enemy.innerHTML = state.enemies.map((enemy) => {
        const index = state.enemies.indexOf(enemy);
        const hp = Math.max(0, enemy.hp);
        const hpWidth = enemy.immortal ? 100 : Math.max(0, Math.min(100, hp / enemy.maxHp * 100));
        const hpText = enemy.immortal ? "HP∞" : `${hp}/${enemy.maxHp}`;
        const hpBar = `<div class="enemy-hp"><div class="enemy-hp-fill" style="width:${hpWidth}%"></div><span class="enemy-hp-text">${hpText}</span></div>`;
        const enemyTargetable = isTargetableEnemy(enemy);
        if (enemy.heroId) {
          const hero = heroes.find((member) => member.id === enemy.heroId);
          const cls = ["unit", hero?.cat ? "cat" : "person", hero?.avatar || "", enemy.hp <= 0 ? "down" : "", enemyTargetable ? "targetable" : ""].join(" ");
          const style = hero?.shirt ? `style="--shirt:${hero.shirt}"` : "";
          return `<div class="${cls}" data-unit="${enemy.name}" ${enemyTargetable ? `data-enemy-target="${index}"` : ""} ${style}>${hpBar}${heroAvatar(hero || {})}<div class="nameplate">${enemy.name}</div></div>`;
        }
        if (enemy.catVariant) {
          const cls = ["unit", "cat", enemy.boss ? "boss" : "", enemy.hp <= 0 ? "down" : "", enemyTargetable ? "targetable" : ""].join(" ");
          return `<div class="${cls}" data-unit="${enemy.name}" ${enemyTargetable ? `data-enemy-target="${index}"` : ""} style="--cat-color:${enemy.catColor || enemy.color || "#22a5e3"}">${hpBar}${heroAvatar({ cat: true, accessory: enemy.accessory, miniDora: enemy.miniDora })}<div class="nameplate">${enemy.name}</div></div>`;
        }
        const cls = ["unit", "gadget", enemy.boss ? "boss" : "", enemy.hp <= 0 ? "down" : "", enemyTargetable ? "targetable" : ""].join(" ");
        return `<div class="${cls}" data-unit="${enemy.name}" ${enemyTargetable ? `data-enemy-target="${index}"` : ""} style="--gadget:${enemy.color}">${hpBar}<div class="avatar gadget-art ${enemy.kind || "air"}">${gadgetMarkup(enemy.kind)}</div><div class="nameplate">${enemy.name}</div></div>`;
      }).join("");
      document.querySelectorAll("[data-enemy-target]").forEach((node) => {
        node.addEventListener("click", () => selectTarget("enemy", Number(node.dataset.enemyTarget)));
      });
    }

    function gadgetMarkup(kind) {
      const faces = '<span class="eye"></span>';
      const parts = {
        air: '<span class="barrel"></span><span class="nozzle"></span>',
        mirror: '<span class="shine"></span>',
        mist: '<span class="cap"></span><span class="cloud"></span>',
        mic: '<span class="grill"></span><span class="handle"></span>',
        speaker: '<span class="cone"></span>',
        note: '<span class="paper"></span>'
      };
      return `${parts[kind] || parts.air}${faces}`;
    }

    function renderRoster() {
      el.roster.innerHTML = heroes.map((hero) => {
        const index = heroes.indexOf(hero);
        const joined = isJoined(hero);
        const hpRatio = joined ? Math.max(0, hero.hp / hero.maxHp) : 0;
        const mpRatio = joined ? Math.max(0, hero.mp / hero.maxMp) : 0;
        const hpWidth = hpRatio * 100;
        const mpWidth = mpRatio * 100;
        const acted = state.actedThisRound.includes(hero.id);
        const stunned = isHeroStunned(hero);
        const targetable = isTargetableHero(hero);
        const chosenTarget = isChosenTarget(hero);
        const disabled = !targetable && (!joined || state.phase !== "battle" || hero.hp <= 0 || acted || stunned);
        return `<button class="card ${index === state.active ? "selected" : ""} ${targetable ? "targetable" : ""} ${chosenTarget ? "chosen-target" : ""}" data-hero="${index}" ${disabled ? "disabled" : ""}>
          <strong>${hero.name}</strong>
          <div class="role">${joined ? (stunned ? "行動不能" : (acted ? "行動済み" : hero.role)) : "未加入"}</div>
          <div class="bar"><div class="fill ${joined ? barTone(hpRatio) : ""}" style="width:${hpWidth}%"></div></div>
          <div class="bar mp"><div class="fill ${joined ? barTone(mpRatio) : ""}" style="width:${mpWidth}%"></div></div>
        </button>`;
      }).join("");
      document.querySelectorAll("[data-hero]").forEach((button) => {
        button.addEventListener("click", () => {
          const next = Number(button.dataset.hero);
          if (state.pendingTarget) {
            selectTarget("ally", next);
            return;
          }
          if (!canAct(heroes[next])) return;
          state.active = next;
          state.log = `行動順を変えた。次は${heroes[state.active].name}。`;
          render();
        });
      });
    }

    function barTone(ratio) {
      if (ratio <= 0.25) return "low";
      if (ratio <= 0.5) return "mid";
      return "";
    }

    function isTargetableEnemy(enemy) {
      if (!state.pendingTarget) return false;
      const skill = skillBook[state.pendingTarget.skillId];
      return state.pendingTarget.type === "enemy" && targetCandidates(skill, state.pendingTarget.type).includes(enemy);
    }

    function isTargetableHero(hero) {
      if (!state.pendingTarget) return false;
      const skill = skillBook[state.pendingTarget.skillId];
      return ["ally", "reviveAlly", "allyMulti3"].includes(state.pendingTarget.type) && targetCandidates(skill, state.pendingTarget.type).includes(hero);
    }

    function isChosenTarget(hero) {
      return !!state.pendingTarget?.selectedIds?.includes(hero.id);
    }

    function isHeroHidden(hero) {
      return state.hiddenHeroIds.includes(hero.id) || hero.id === state.hiddenHeroId;
    }

    function renderSkills() {
      const hero = heroes[state.active];
      el.skills.innerHTML = effectiveSkillIds(hero).map((id) => {
        const skill = skillBook[id];
        const available = skillAvailable(id);
        const acted = state.actedThisRound.includes(hero.id);
        const stunned = isHeroStunned(hero);
        const usedOnce = skill.once && state.onceUsed[id];
        const cost = skillCost(id);
        const disabled = skill.passive || !!state.pendingTarget || state.phase !== "battle" || hero.hp <= 0 || hero.mp < cost || !available || acted || stunned || usedOnce;
        const lock = skill.passive && available ? skillText(id) : (available ? (usedOnce ? "使用済み" : "") : "未回収");
        const borrowed = hero.id === "cat" && !hero.skills.includes(id) ? " / 借り道具" : "";
        const detail = `${skillText(id)}${borrowed}`;
        return `<button class="skill" data-skill="${id}" ${disabled ? "disabled" : ""}>
          <span>${skill.name} MP${cost}</span>
          <small>${formatSkillDetail(lock || detail)}</small>
        </button>`;
      }).join("");
      document.querySelectorAll("[data-skill]").forEach((button) => button.addEventListener("click", () => useSkill(button.dataset.skill)));
    }

    function formatSkillDetail(text) {
      const safe = String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
      if (!/(回復|復活)/.test(safe)) return safe;
      return safe.replace(/(\d+)(?=(?:%?回復|MP|％?回復|回復))/g, '<span class="heal-number">$1</span>');
    }

    function flashUnit(key, cls) {
      const safe = String(key).replace(/"/g, '\\"');
      setTimeout(() => {
        const node = document.querySelector(`[data-unit="${safe}"]`);
        if (!node) return;
        node.classList.add(cls);
        setTimeout(() => node.classList.remove(cls), 520);
      }, 20);
    }

    function popupUnit(key, value, type) {
      const safe = String(key).replace(/"/g, '\\"');
      setTimeout(() => {
        const node = document.querySelector(`[data-unit="${safe}"]`);
        if (!node) return;
        node.querySelectorAll(".damage-pop").forEach((existing) => existing.remove());
        const pop = document.createElement("span");
        pop.className = `damage-pop ${type || ""}`;
        pop.textContent = value;
        node.appendChild(pop);
        setTimeout(() => pop.remove(), 1120);
      }, 40);
    }

    function showTurnBanner(text) {
      el.turnBanner.textContent = text;
      el.log.textContent = `${text}！`;
      el.turnBanner.classList.remove("show");
      void el.turnBanner.offsetWidth;
      el.turnBanner.classList.add("show");
    }

    async function telegraphEnemyAttack(enemy, attackName) {
      state.log = `${enemy.name}の攻撃「${attackName}」！`;
      render();
      showTurnBanner(attackName);
      flashUnit(enemy.name, "attack");
      await wait(760);
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function resetGame() {
      heroes.forEach((hero) => {
        hero.hp = hero.maxHp;
        hero.mp = hero.maxMp;
      });
      state.chapter = 0;
      state.active = 0;
      state.recovered = [];
      state.mpItems = 3;
      state.defeatCount = 0;
      state.actedThisRound = [];
      state.stunnedHeroIds = [];
      state.weakenedHeroIds = [];
      state.pendingTarget = null;
      state.lastReward = "";
      state.guard = 0;
      resetTurnEffects();
      state.rewinding = false;
      el.rewind.classList.remove("show", "rewinding");
      state.ended = false;
      startChapter();
    }

    el.start.addEventListener("click", () => {
      clearSavedGame();
      el.title.classList.add("hidden");
      resetGame();
    });
    el.continue.addEventListener("click", () => {
      if (!loadGame()) {
        updateTitleState();
        return;
      }
      el.title.classList.add("hidden");
    });
    document.getElementById("nextBtn").addEventListener("click", switchHero);
    el.retry.addEventListener("click", retryBattleWithTimeMachine);
    el.titleBack.addEventListener("click", backToTitle);
    el.advance.addEventListener("click", beginBattle);
    el.story.addEventListener("click", advanceStory);
    document.getElementById("arena").addEventListener("click", (event) => {
      if (!state.pendingTarget) return;
      if (event.target.closest("[data-enemy-target], [data-ally-target], .story-strip")) return;
      cancelTargetSelection();
    });
    el.skills.addEventListener("click", (event) => {
      if (!state.pendingTarget) return;
      if (event.target.closest("[data-skill]")) return;
      cancelTargetSelection();
    });
    el.roster.addEventListener("click", (event) => {
      if (!state.pendingTarget) return;
      if (event.target.closest("[data-hero]")) return;
      cancelTargetSelection();
    });

    startChapter();
    updateTitleState();
  </script>
</body>
</html>
